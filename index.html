<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบริหารจัดการสต็อก (Factory OS)</title>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SheetJS for Excel Import -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Sarabun', 'sans-serif'] },
                    colors: {
                        primary: '#4f46e5', secondary: '#64748b', success: '#10b981', warning: '#f59e0b', danger: '#ef4444', dark: '#0f172a'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f1f5f9; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { background: rgba(255, 255, 255, 0.1); border-left: 4px solid #6366f1; color: white; }
        .nav-item { border-left: 4px solid transparent; color: #94a3b8; }
        .nav-item:hover { color: white; background: rgba(255, 255, 255, 0.05); }
        .dashboard-card { transition: all 0.3s ease; }
        .dashboard-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .progress-bar-bg { background-color: #e2e8f0; border-radius: 9999px; height: 6px; width: 100%; overflow: hidden; }
        .progress-bar-fill { height: 100%; border-radius: 9999px; transition: width 0.5s ease; }
        .login-bg { background-image: linear-gradient(135deg, #4f46e5 0%, #0f172a 100%); }
        .dropdown-item { transition: all 0.2s ease; }
        .dropdown-item:active { background-color: #e0e7ff; }
        
        .segmented-control { background: #f8fafc; border: 1px solid #e2e8f0; padding: 4px; border-radius: 12px; display: flex; gap: 2px; }
        .segmented-item { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; color: #64748b; border: 1px solid transparent; }
        .segmented-item:hover:not(.active) { background: #fff; color: #4f46e5; border-color: #f1f5f9; }
        .segmented-item.active { background: #fff; color: #4f46e5; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); border-color: #e2e8f0; }
        .badge-count { background: #f1f5f9; color: #94a3b8; padding: 1px 6px; border-radius: 6px; font-size: 11px; }
        .active .badge-count { background: #eef2ff; color: #4f46e5; }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-hidden h-screen w-screen relative">

    <!-- 1. LOADING SCREEN -->
    <div id="loading-screen" class="fixed inset-0 bg-slate-900 z-[60] flex flex-col items-center justify-center text-white transition-opacity duration-500">
        <i class="fas fa-circle-notch fa-spin text-5xl text-primary mb-4"></i>
        <h2 class="text-xl font-bold">กำลังเชื่อมต่อฐานข้อมูล Cloud...</h2>
        <p class="text-slate-400 text-sm mt-2">ตรวจสอบสิทธิ์การเข้าถึง</p>
    </div>

    <!-- 2. LOGIN SCREEN -->
    <div id="login-view" class="fixed inset-0 z-50 flex items-center justify-center login-bg hidden">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 m-4 fade-in">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary text-white rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-lg shadow-indigo-500/30">
                    <i class="fas fa-cubes"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">Factory OS</h1>
                <p class="text-slate-500 text-sm">เข้าสู่ระบบเพื่อใช้งาน</p>
            </div>

            <form onsubmit="handleLogin(event)" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">ชื่อผู้ใช้งาน (Username)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"><i class="fas fa-user"></i></span>
                        <input type="text" name="username" class="w-full pl-10 pr-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary outline-none transition-all" placeholder="Username" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">รหัสผ่าน (Password)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"><i class="fas fa-key"></i></span>
                        <input type="password" name="password" class="w-full pl-10 pr-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary outline-none transition-all" placeholder="Password" required>
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full bg-primary hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all transform active:scale-95 flex items-center justify-center gap-2">
                        เข้าสู่ระบบ <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </form>
            <div id="login-error" class="text-center text-xs text-red-500 mt-4 hidden"></div>
        </div>
    </div>

    <!-- 3. MAIN APP LAYOUT -->
    <div id="app-layout" class="flex h-screen w-full hidden opacity-0 transition-opacity duration-300">
        
        <!-- SIDEBAR -->
        <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-xl z-20">
            <div class="h-16 flex items-center px-6 border-b border-slate-800 bg-slate-900">
                <div class="w-8 h-8 bg-indigo-600 text-white rounded-lg flex items-center justify-center mr-3 shadow-lg">
                    <i class="fas fa-cubes"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg tracking-tight">Factory OS</h1>
                    <p class="text-[10px] text-emerald-400 font-medium uppercase tracking-wider"><i class="fas fa-wifi mr-1"></i> Online</p>
                </div>
            </div>
            <nav class="flex-1 overflow-y-auto py-6 px-2">
                <p class="px-4 text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">เมนูหลัก</p>
                <ul id="menu-list" class="space-y-1"></ul>
            </nav>
            <div class="p-4 border-t border-slate-800 bg-slate-900/50 cursor-pointer hover:bg-slate-800 transition-colors" onclick="window.openProfileModal()">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold shadow-lg ring-2 ring-slate-800">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold text-white truncate" id="current-user-name">Guest</p>
                        <p class="text-xs text-indigo-400 font-medium truncate" id="current-user-role">Role</p>
                    </div>
                    <i class="fas fa-cog text-slate-500 text-xs"></i>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#f1f5f9]">
            <header class="h-16 bg-white/90 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-8 z-10 sticky top-0 shadow-sm">
                <div class="flex items-center gap-4">
                    <h2 class="text-xl font-bold text-slate-800" id="page-title">Dashboard</h2>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-bold text-slate-700 leading-tight" id="topbar-user-name">User</p>
                        <span class="text-[10px] bg-indigo-50 text-primary px-2 py-0.5 rounded border border-indigo-100 uppercase" id="topbar-user-role">Role</span>
                    </div>
                    <div class="h-8 w-px bg-slate-200 mx-2"></div>
                    <button onclick="logout()" class="text-slate-400 hover:text-red-500 transition-colors p-2" title="ออกจากระบบ">
                        <i class="fas fa-sign-out-alt text-lg"></i>
                    </button>
                </div>
            </header>
            <div id="content-area" class="flex-1 overflow-y-auto p-8 relative scroll-smooth"></div>
        </main>
    </div>

    <!-- MODALS -->
    <!-- Profile Modal -->
    <div id="profile-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-slate-900/60 backdrop-blur-sm fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-96 overflow-hidden border border-white/20">
            <div class="bg-gradient-to-r from-slate-700 to-slate-900 px-6 py-4 flex justify-between items-center">
                <h3 class="text-lg font-bold text-white"><i class="fas fa-user-circle mr-2"></i> โปรไฟล์ของฉัน</h3>
                <button onclick="closeModal('profile-modal')" class="text-slate-400 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <input type="hidden" id="profile-id">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">ชื่อผู้ใช้งาน (Username)</label>
                    <input type="text" id="profile-username" class="w-full border p-2 rounded-lg bg-slate-100 text-slate-500 cursor-not-allowed" readonly>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">ชื่อที่แสดง (Display Name)</label>
                    <input type="text" id="profile-name" class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-primary outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">รหัสผ่านใหม่ (ว่างไว้ถ้าไม่เปลี่ยน)</label>
                    <input type="password" id="profile-password" class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-primary outline-none" placeholder="New Password">
                </div>
                <div class="pt-2">
                    <button onclick="saveProfile()" class="w-full bg-primary hover:bg-indigo-700 text-white py-2 rounded-lg font-bold shadow transition-all">บันทึกการเปลี่ยนแปลง</button>
                </div>
            </div>
        </div>
    </div>

    <!-- User Management Modal -->
    <div id="user-manage-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-slate-900/60 backdrop-blur-sm fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden border border-white/20">
            <div class="bg-gradient-to-r from-blue-600 to-cyan-600 px-6 py-4 flex justify-between items-center">
                <h3 class="text-lg font-bold text-white"><i class="fas fa-users-cog mr-2"></i> เพิ่มผู้ใช้งานใหม่</h3>
                <button onclick="closeModal('user-manage-modal')" class="text-blue-200 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <form onsubmit="handleCreateUser(event)" class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Username</label><input type="text" name="new_username" class="w-full border p-2 rounded-lg" required></div>
                    <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Password</label><input type="text" name="new_password" class="w-full border p-2 rounded-lg" required></div>
                </div>
                <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">ชื่อพนักงาน</label><input type="text" name="new_name" class="w-full border p-2 rounded-lg" required></div>
                <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">ตำแหน่ง (Role)</label><select name="new_role" class="w-full border p-2 rounded-lg bg-white"><option value="STOCK">Stock</option><option value="QC">QC</option><option value="ADMIN">Admin</option></select></div>
                <div class="pt-2"><button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-bold shadow">สร้างผู้ใช้</button></div>
            </form>
        </div>
    </div>

    <!-- Min Stock Modal -->
    <div id="min-stock-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-slate-900/60 backdrop-blur-sm fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-96 overflow-hidden border border-white/20">
            <div class="bg-gradient-to-r from-orange-500 to-amber-500 px-6 py-4"><h3 class="text-lg font-bold text-white"><i class="fas fa-bell mr-2"></i> ตั้งค่า Min Stock</h3></div>
            <div class="p-6">
                <input type="hidden" id="modal-item-id">
                <div class="mb-6"><label class="block text-xs font-bold text-slate-400 uppercase mb-2" id="modal-item-name">สินค้า</label><input type="number" id="modal-min-stock-input" class="w-full border-2 border-slate-200 rounded-xl p-3 text-center text-3xl font-bold text-slate-700 focus:border-orange-400 outline-none" min="0"></div>
                <div class="flex justify-end gap-3"><button onclick="closeModal('min-stock-modal')" class="px-5 py-2.5 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 font-bold">ยกเลิก</button><button onclick="saveMinStockModal()" class="px-5 py-2.5 bg-orange-500 text-white rounded-lg hover:bg-orange-600 font-bold shadow-lg">บันทึก</button></div>
            </div>
        </div>
    </div>

    <!-- Edit Item Modal -->
    <div id="edit-item-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-slate-900/60 backdrop-blur-sm fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden border border-white/20">
            <div class="bg-gradient-to-r from-blue-600 to-indigo-600 px-6 py-4"><h3 class="text-lg font-bold text-white"><i class="fas fa-edit mr-2"></i> แก้ไขข้อมูลสินค้า</h3></div>
            <div class="p-6 space-y-4">
                <input type="hidden" id="edit-item-id">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">รหัส (แก้ไขไม่ได้)</label><input type="text" id="edit-item-code" class="w-full border border-slate-300 rounded-lg px-3 py-2 bg-slate-100 cursor-not-allowed" readonly></div>
                    <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Min Stock</label><input type="number" id="edit-item-min" class="w-full border border-slate-300 rounded-lg px-3 py-2 font-bold" min="0"></div>
                </div>
                <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">ชื่อสินค้า</label><input type="text" id="edit-item-name" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">ประเภท</label><select id="edit-item-type" class="w-full border border-slate-300 rounded-lg px-3 py-2 bg-white"><option value="RM">RM</option><option value="FG">FG</option><option value="PKG">PKG</option></select></div>
                    <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">หน่วย</label><select id="edit-item-unit" class="w-full border border-slate-300 rounded-lg px-3 py-2 bg-white"><option value="kg">kg</option><option value="pcs">pcs</option><option value="set">set</option><option value="g">g</option><option value="ml">ml</option></select></div>
                </div>
                <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
                    <button onclick="closeModal('edit-item-modal')" class="px-5 py-2.5 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 font-bold">ยกเลิก</button>
                    <button onclick="saveEditItem()" class="px-5 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-bold shadow-lg">บันทึก</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Printable Area -->
    <div id="printable-area" class="hidden p-8"></div>

    <!-- SCRIPT 1: STATE & UI HELPERS -->
    <script>
        window.localData = { items: [], stock: [], transactions: [], users: [] };
        window.appState = { 
            currentUser: null, 
            currentView: 'dashboard', 
            issueCart: [], 
            issueRefDoc: '', 
            issueDate: '',
            inventoryFilter: 'ALL', 
            inventoryLowStockOnly: false
        };

        window.openProfileModal = function() {
            const u = window.appState.currentUser;
            if(!u) return;
            document.getElementById('profile-id').value = u.id || '';
            document.getElementById('profile-username').value = u.username || '';
            document.getElementById('profile-name').value = u.name || '';
            document.getElementById('profile-password').value = '';
            document.getElementById('profile-modal').classList.remove('hidden');
        };

        window.openUserManageModal = function() {
            if (!window.appState.currentUser || window.appState.currentUser.role !== 'ADMIN') return alertError('Admin Only');
            document.getElementById('user-manage-modal').classList.remove('hidden');
        };

        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
        window.alertSuccess = (m) => alert("✅ " + m); 
        window.alertError = (m) => alert("❌ " + m);

        // --- EXCEL IMPORT LOGIC ---
        window.handleExcelImport = function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet);

                    if (jsonData.length === 0) return alertError("ไฟล์ว่างเปล่า");

                    let successCount = 0;
                    for (const row of jsonData) {
                        const item = {
                            code: (row["รหัส"] || row["Code"] || "").toString().trim(),
                            name: (row["ชื่อ"] || row["Name"] || "").toString().trim(),
                            type: (row["ประเภท"] || row["Type"] || "RM").toString().trim().toUpperCase(),
                            unit: (row["หน่วย"] || row["Unit"] || "pcs").toString().trim().toLowerCase(),
                            minStock: parseInt(row["Min Stock"] || row["Min"] || 0)
                        };

                        if (item.code && item.name) {
                            if (!window.localData.items.find(x => x.code === item.code)) {
                                await window.createItem(item, true); 
                                successCount++;
                            }
                        }
                    }

                    alertSuccess(`นำเข้าข้อมูลสำเร็จ ${successCount} รายการ`);
                    event.target.value = ''; 
                } catch (err) {
                    console.error(err);
                    alertError("เกิดข้อผิดพลาดในการประมวลผลไฟล์: " + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        };

        window.printStockCheckSheet = function() {
            const currentFilter = window.appState.inventoryFilter;
            const isLowOnly = window.appState.inventoryLowStockOnly;
            
            let filtered = window.localData.items;
            if (currentFilter !== 'ALL') filtered = filtered.filter(i => i.type === currentFilter);
            
            const printData = filtered.map(i => {
                const s = window.localData.stock.filter(x => String(x.itemId) === String(i.id));
                const tot = s.reduce((a, b) => a + b.qty, 0);
                const isLow = tot <= (i.minStock || 0) && (i.minStock || 0) > 0;
                if (isLowOnly && !isLow) return null;
                return { code: i.code, name: i.name, balance: tot.toFixed(2), unit: i.unit };
            }).filter(x => x !== null);

            if (printData.length === 0) return alertError("ไม่มีข้อมูลสำหรับพิมพ์");

            const today = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            const html = `
                <div class="print-container">
                    <div class="header">
                        <h1>แบบฟอร์มตรวจนับสินค้าประจำงวด</h1>
                        <p>ข้อมูล ณ วันที่: ${today} | ประเภทสินค้า: ${currentFilter}</p>
                    </div>
                    <table class="print-table">
                        <thead>
                            <tr>
                                <th>รหัสสินค้า</th>
                                <th>ชื่อสินค้า</th>
                                <th>ยอดในระบบ</th>
                                <th>หน่วย</th>
                                <th>นับจริง</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${printData.map(item => `
                                <tr>
                                    <td class="font-mono" style="text-align: left;">${item.code}</td>
                                    <td style="text-align: left;">${item.name}</td>
                                    <td style="text-align: center;">${item.balance}</td>
                                    <td style="text-align: center;">${item.unit}</td>
                                    <td class="check-box"></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div class="footer">
                        <div class="sig-box"><p>__________________________</p><p>( ผู้ตรวจนับ )</p></div>
                        <div class="sig-box"><p>__________________________</p><p>( ผู้รับรอง/Admin )</p></div>
                    </div>
                </div>
            `;

            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html><head><title>พิมพ์ใบตรวจนับสต็อก</title><link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
                <style>@page { size: A4; margin: 0.5cm; } body { font-family: 'Sarabun', sans-serif; margin: 0; padding: 0; color: #333; font-size: 12px; }
                .print-container { padding: 10px; } .header { text-align: center; margin-bottom: 15px; border-bottom: 2px solid #000; padding-bottom: 10px; }

        window.getConversionFactor = (from, to) => {
            if (from === to) return 1;
            const units = { 'kg_g': 1/1000, 'g_kg': 1000, 'l_ml': 1000, 'ml_l': 1/1000 };
            return units[`${to}_${from}`] || 1; 
        };

        function renderSearchableItemInput(cid) { 
            return `
                <div class="relative group w-full" id="search-container-${cid}">
                    <div class="flex items-center border border-slate-300 rounded-lg bg-white overflow-hidden focus-within:border-indigo-500 focus-within:ring-4 focus-within:ring-indigo-500/10 transition-all shadow-sm">
                        <div class="bg-slate-50 px-3 py-2.5 border-r border-slate-200 text-slate-400"><i class="fas fa-search"></i></div>
                        <input type="text" id="search-input-${cid}" class="w-full px-3 py-2.5 outline-none text-slate-700 placeholder-slate-400" placeholder="ค้นหาด้วยชื่อหรือรหัส..." autocomplete="off" onfocus="openDropdown('${cid}')" oninput="handleSearchInput('${cid}')" onblur="handleInputBlur('${cid}')">
                        <div id="clear-btn-${cid}" class="hidden cursor-pointer px-3 text-slate-400 hover:text-danger transition-colors" onclick="clearSelection('${cid}')"><i class="fas fa-times-circle"></i></div>
                        <input type="hidden" name="itemId" id="hidden-item-id-${cid}">
                    </div>
                    <div id="dropdown-list-${cid}" class="hidden absolute z-50 w-full bg-white border border-slate-200 mt-1 rounded-lg shadow-xl max-h-60 overflow-y-auto custom-scrollbar animate-fade-in-down">
                        ${generateDropdownItems(cid)}
                    </div>
                </div>`; 
        }

        window.handleSearchInput = (cid) => { 
            document.getElementById('hidden-item-id-'+cid).value = ''; 
            document.getElementById('clear-btn-'+cid).classList.remove('hidden'); 
            document.getElementById('dropdown-list-'+cid).innerHTML = generateDropdownItems(cid, document.getElementById('search-input-'+cid).value); 
            document.getElementById('dropdown-list-'+cid).classList.remove('hidden'); 
        };

        window.handleInputBlur = (cid) => { 
            setTimeout(() => { 
                const h=document.getElementById('hidden-item-id-'+cid), i=document.getElementById('search-input-'+cid), l=document.getElementById('dropdown-list-'+cid), c=document.getElementById('clear-btn-'+cid);
                if(l) l.classList.add('hidden'); 
                if(h && !h.value && i) { i.value=''; if(c) c.classList.add('hidden'); } 
            }, 300); 
        };

        function generateDropdownItems(cid, txt='') { 
            const l=window.localData.items.filter(i=>i.code.toLowerCase().includes(txt.toLowerCase())||i.name.toLowerCase().includes(txt.toLowerCase())); 
            if(!l.length) return `<div class="p-4 text-slate-400 text-center text-sm">ไม่พบสินค้า</div>`;
            return l.map(i => `<div class="dropdown-item cursor-pointer hover:bg-indigo-50 px-4 py-3 border-b border-slate-100 last:border-0" onmousedown="selectDropdownItem('${cid}','${i.id}','${i.code}','${i.name}')"><div class="flex justify-between"><span class="font-bold text-indigo-600 font-mono">${i.code}</span><span class="text-xs bg-slate-200 px-2 rounded">${i.type}</span></div><div class="text-sm text-slate-700">${i.name}</div></div>`).join(''); 
        }

        window.openDropdown=(cid)=>{ 
            const el = document.getElementById('dropdown-list-'+cid);
            if(el) { el.innerHTML=generateDropdownItems(cid); el.classList.remove('hidden'); }
        };

        window.selectDropdownItem=(cid,id,c,n)=>{ 
            document.getElementById('hidden-item-id-'+cid).value=id; 
            document.getElementById('search-input-'+cid).value=`${c} : ${n}`; 
            document.getElementById('dropdown-list-'+cid).classList.add('hidden'); 
            document.getElementById('clear-btn-'+cid).classList.remove('hidden'); 
        };

        window.clearSelection=(cid)=>{ 
            document.getElementById('hidden-item-id-'+cid).value=''; 
            document.getElementById('search-input-'+cid).value=''; 
            document.getElementById('clear-btn-'+cid).classList.add('hidden'); 
        };

        window.handleLogin = (e) => {
            e.preventDefault();
            const d = new FormData(e.target);
            const user = window.localData.users.find(u => u.username === d.get('username') && u.password === d.get('password'));
            if (user) {
                window.appState.currentUser = user;
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('app-layout').classList.remove('hidden');
                setTimeout(()=>document.getElementById('app-layout').classList.remove('opacity-0'),50);
                renderView('dashboard');
            } else {
                const err = document.getElementById('login-error');
                err.innerText = "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง";
                err.classList.remove('hidden');
            }
        };

        window.logout = () => {
            if(confirm('ออกจากระบบ?')) {
                window.appState.currentUser = null;
                document.getElementById('app-layout').classList.add('opacity-0');
                setTimeout(() => {
                    document.getElementById('app-layout').classList.add('hidden');
                    document.getElementById('login-view').classList.remove('hidden');
                    document.querySelector('#login-view form').reset();
                    document.getElementById('login-error').classList.add('hidden');
                }, 300);
            }
        };
    </script>

    <!-- SCRIPT 2: FIREBASE MODULE -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAqOMC8fVaRMDB5aPpoImYSVFwjU1d_99k",
            authDomain: "onsetstock.firebaseapp.com",
            projectId: "onsetstock",
            storageBucket: "onsetstock.firebasestorage.app",
            messagingSenderId: "159241390751",
            appId: "1:159241390751:web:58bef364f4678621ac70aa",
            measurementId: "G-SKB9T0KMEP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'factory-os-main'; 

        async function initApp() {
            try {
                await signInAnonymously(auth); 
                const basePath = `artifacts/${appId}/public/data`;
                onSnapshot(collection(db, basePath, 'items'), (s) => { window.localData.items = s.docs.map(d=>({id:d.id,...d.data()})); refreshView(); });
                onSnapshot(collection(db, basePath, 'stock'), (s) => { window.localData.stock = s.docs.map(d=>({id:d.id,...d.data()})); refreshView(); });
                onSnapshot(collection(db, basePath, 'transactions'), (s) => { window.localData.transactions = s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.timestamp||0)-(a.timestamp||0)); refreshView(); });
                onSnapshot(collection(db, basePath, 'users'), async (s) => { 
                    window.localData.users = s.docs.map(d=>({id:d.id,...d.data()}));
                    const seeds = [{u:'admin',p:'1234',n:'System Admin',r:'ADMIN'},{u:'stock',p:'1234',n:'Stock Manager',r:'STOCK'},{u:'qc',p:'1234',n:'QC Inspector',r:'QC'}];
                    for (const u of seeds) { if (!window.localData.users.find(x => x.username === u.u)) { await addDoc(collection(db, basePath, 'users'), {username:u.u,password:u.p,name:u.n,role:u.r}); } }
                    refreshView(); 
                });
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('login-view').classList.remove('hidden');
            } catch (e) { console.error(e); }
        }
        function refreshView() { if(window.appState.currentUser) renderView(window.appState.currentView); }
        initApp();

        // ACTIONS
        window.createItem = async (d, silent=false) => { 
            try { 
                await addDoc(collection(db, `artifacts/${appId}/public/data/items`), { 
                    code: d.code.toUpperCase(), name: d.name, type: d.type, unit: d.unit, minStock: parseInt(d.minStock)||0 
                }); 
                if(!silent) alertSuccess('สำเร็จ'); 
                if(!silent) renderView('item-master'); 
            } catch(e){ if(!silent) alertError(e.message); } 
        };
        window.deleteItem = async (id) => { try { await deleteDoc(doc(db, `artifacts/${appId}/public/data/items`, id)); alertSuccess('ลบแล้ว'); } catch(e){alertError(e.message)} };
        window.saveEditItem = async () => { const id=document.getElementById('edit-item-id').value; try { await updateDoc(doc(db, `artifacts/${appId}/public/data/items`, id), { name: document.getElementById('edit-item-name').value, type: document.getElementById('edit-item-type').value, unit: document.getElementById('edit-item-unit').value, minStock: parseInt(document.getElementById('edit-item-min').value) }); closeModal('edit-item-modal'); alertSuccess('แก้ไขแล้ว'); } catch(e){alertError(e.message)} };
        window.saveMinStockModal = async () => { const id=document.getElementById('modal-item-id').value; try { await updateDoc(doc(db, `artifacts/${appId}/public/data/items`, id), { minStock: parseInt(document.getElementById('modal-min-stock-input').value) }); closeModal('min-stock-modal'); } catch(e){alertError(e.message)} };
        
        window.receiveItem = async (d) => { 
            const t=new Date().toISOString().split('T')[0], item = window.localData.items.find(x => String(x.id) === String(d.itemId));
            if(!item) return alertError("ไม่พบข้อมูลสินค้า");
            const factor = window.getConversionFactor(d.unit, item.unit), convertedQty = parseFloat(d.qty) * factor;
            try { 
                await addDoc(collection(db, `artifacts/${appId}/public/data/stock`), { itemId: d.itemId, lotNo: d.lotNo, qty: convertedQty, unit: item.unit, status: 'WAIT_QC', expDate: d.expDate, location: d.location, receivedDate: t, timestamp: Date.now() }); 
                await logTransaction('RECEIVE', d.itemId, d.lotNo, convertedQty, `Loc: ${d.location} (Input: ${d.qty} ${d.unit})`); 
                alertSuccess(`รับของแล้ว (${convertedQty} ${item.unit})`); renderView('dashboard'); 
            } catch(e){alertError(e.message)} 
        };

        window.qcAction = async (id, act, rem) => { const s=window.localData.stock.find(x=>x.id===id); if(!s)return; let st=act==='PASS'?'AVAILABLE':(act==='HOLD'?'HOLD':'REJECT'); try { await updateDoc(doc(db, `artifacts/${appId}/public/data/stock`, id), { status: st }); await logTransaction('QC_'+act, s.itemId, s.lotNo, 0, `${s.status}->${st} (${rem})`); alertSuccess('บันทึก QC'); } catch(e){alertError(e.message)} };
        
        window.processIssueBatch = async () => {
            if(!window.appState.issueCart.length || !window.appState.issueRefDoc) return alertError('ข้อมูลไม่ครบ');
            try {
                for(let c of window.appState.issueCart) {
                    const lots = window.localData.stock.filter(s=>String(s.itemId) === String(c.itemId) && s.status==='AVAILABLE' && s.qty>0).sort((a,b)=>new Date(a.expDate)-new Date(b.expDate));
                    let rem = c.baseQty; 
                    for(let l of lots) { if(rem<=0) break; let deduct = Math.min(l.qty, rem); await updateDoc(doc(db, `artifacts/${appId}/public/data/stock`, l.id), { qty: l.qty - deduct }); await logTransaction('ISSUE', c.itemId, l.lotNo, -deduct, `Ref: ${window.appState.issueRefDoc}`, window.appState.issueDate); rem -= deduct; }
                }
                window.appState.issueCart=[]; window.appState.issueRefDoc=''; alertSuccess('เบิกสำเร็จ'); renderView('dashboard');
            } catch(e){alertError(e.message)}
        };

        window.saveProfile = async () => { const id=document.getElementById('profile-id').value, name=document.getElementById('profile-name').value, pass=document.getElementById('profile-password').value, dataObj={name}; if(pass)dataObj.password=pass; try { await updateDoc(doc(db,`artifacts/${appId}/public/data/users`,id),dataObj); window.appState.currentUser.name=name; closeModal('profile-modal'); alertSuccess('บันทึกแล้ว'); }catch(e){alertError(e.message)} };
        window.handleCreateUser = async (e) => { e.preventDefault(); const d=new FormData(e.target); if(window.localData.users.find(u=>u.username===d.get('new_username')))return alertError('Username ซ้ำ'); try { await addDoc(collection(db,`artifacts/${appId}/public/data/users`),{username:d.get('new_username'),password:d.get('new_password'),name:d.get('new_name'),role:d.get('new_role')}); closeModal('user-manage-modal'); alertSuccess('สร้างแล้ว'); renderView('user-list'); }catch(e){alertError(e.message)} };
        window.deleteUser = async (id) => { if(confirm('ลบผู้ใช้งานนี้?')) { try { await deleteDoc(doc(db,`artifacts/${appId}/public/data/users`,id)); alertSuccess('ลบแล้ว'); renderView('user-list'); }catch(e){alertError(e.message)} } };
        
        window.deleteTransaction = async (id) => {
            if (window.appState.currentUser.role !== 'ADMIN') return alertError('ไม่มีสิทธิ์');
            if (confirm('คุณต้องการลบประวัติรายการนี้ใช่หรือไม่?')) {
                try { await deleteDoc(doc(db, `artifacts/${appId}/public/data/transactions`, id)); alertSuccess('ลบประวัติสำเร็จ'); renderView('history'); } catch (e) { alertError(e.message); }
            }
        };

        async function logTransaction(type, itemId, lotNo, qty, note, cDate) {
            const i = window.localData.items.find(x=>String(x.id) === String(itemId));
            await addDoc(collection(db, `artifacts/${appId}/public/data/transactions`), {
                type, itemId, item: i?`${i.code} - ${i.name}`:'?', lot: lotNo, qty, 
                actionBy: window.appState.currentUser.name, note: note||'-', 
                date: (cDate?new Date(cDate):new Date()).toLocaleString('th-TH'), timestamp: Date.now()
            });
        }
    </script>

    <!-- SCRIPT 3: UI RENDERERS -->
    <script>
        function checkPerm(act) { const r=window.appState.currentUser.role; return act==='manage_item' ? (r==='ADMIN'||r==='STOCK') : false; }
        function handleCreateItem(e) { e.preventDefault(); window.createItem(Object.fromEntries(new FormData(e.target))); }
        function handleReceiveSubmit(e) { e.preventDefault(); const d = Object.fromEntries(new FormData(e.target)); if(!d.itemId) return alertError("เลือกสินค้า"); window.receiveItem(d); e.target.reset(); document.getElementById('search-input-receive-item').value = ''; }
        function handleAddIssueItem() { 
            const id=document.getElementById('hidden-item-id-issue-item').value, inputQty=parseFloat(document.getElementById('input-qty').value), inputUnit=document.getElementById('input-unit').value; 
            if(!id || isNaN(inputQty) || !inputUnit) return alertError('ข้อมูลไม่ครบ');
            const item = window.localData.items.find(x=>String(x.id) === String(id));
            const factor = window.getConversionFactor(inputUnit, item.unit), baseQty = inputQty * factor; 
            window.appState.issueCart.push({ itemId: id, item: item, displayQty: inputQty, displayUnit: inputUnit, baseQty: baseQty, unit: item.unit });
            document.getElementById('input-qty').value = ''; document.getElementById('search-input-issue-item').value = ''; renderView('issue');
        }
        function removeFromIssueCart(idx) { window.appState.issueCart.splice(idx, 1); renderView('issue'); }
        function openMinStockModal(id) { if(!checkPerm('manage_item')) return alertError('ไม่มีสิทธิ์'); const i = window.localData.items.find(x=>String(x.id) === String(id)); document.getElementById('modal-item-id').value=id; document.getElementById('modal-item-name').innerText=`${i.code}: ${i.name}`; document.getElementById('modal-min-stock-input').value=i.minStock||0; document.getElementById('min-stock-modal').classList.remove('hidden'); setTimeout(() => { document.getElementById('modal-min-stock-input').select(); }, 100); };
        function openEditItemModal(id) { if(!checkPerm('manage_item')) return alertError('ไม่มีสิทธิ์'); const i = window.localData.items.find(x=>String(x.id) === String(id)); document.getElementById('edit-item-id').value = i.id; document.getElementById('edit-item-code').value = i.code; document.getElementById('edit-item-name').value = i.name; document.getElementById('edit-item-type').value = i.type; document.getElementById('edit-item-unit').value = i.unit; document.getElementById('edit-item-min').value = i.minStock || 0; document.getElementById('edit-item-modal').classList.remove('hidden'); };

        const menuConfig = {
            ADMIN: [{id:'dashboard',l:'ภาพรวม',i:'fa-chart-pie'},{id:'inventory-status',l:'ยอดคงเหลือ',i:'fa-boxes-stacked'},{id:'item-master',l:'ข้อมูลสินค้า',i:'fa-box'},{id:'receive',l:'รับของเข้า',i:'fa-dolly'},{id:'qc-task',l:'ตรวจ QC',i:'fa-clipboard-check'},{id:'issue',l:'เบิกจ่าย',i:'fa-truck-fast'},{id:'history',l:'ประวัติ',i:'fa-clock-rotate-left'}, {id:'user-list',l:'จัดการผู้ใช้',i:'fa-users-cog'}],
            STOCK: [{id:'dashboard',l:'ภาพรวม',i:'fa-chart-pie'},{id:'inventory-status',l:'ยอดคงเหลือ',i:'fa-boxes-stacked'},{id:'item-master',l:'ข้อมูลสินค้า',i:'fa-box'},{id:'receive',l:'รับของเข้า',i:'fa-dolly'},{id:'issue',l:'เบิกจ่าย',i:'fa-truck-fast'},{id:'history',l:'ประวัติ',i:'fa-clock-rotate-left'}],
            QC: [{id:'qc-task',l:'งานรอตรวจ',i:'fa-clipboard-check'},{id:'dashboard',l:'ดูสต็อก',i:'fa-search'},{id:'inventory-status',l:'ยอดคงเหลือ',i:'fa-boxes-stacked'}]
        };

        window.renderView = (viewId) => {
            window.appState.currentView = viewId;
            const user = window.appState.currentUser;
            document.getElementById('menu-list').innerHTML = (menuConfig[user.role]||[]).map(m => `<li onclick="renderView('${m.id}')" class="nav-item ${viewId===m.id?'active':''} group flex items-center gap-3 px-4 py-3 cursor-pointer rounded-lg transition-all mb-1 mx-2"><i class="fas ${m.i} w-6 text-center text-lg"></i><span class="font-medium text-sm">${m.l}</span></li>`).join('');

            if(viewId==='dashboard') content.innerHTML=renderDashboard();

            else if(viewId==='item-master') content.innerHTML=renderItemMaster();
            else if(viewId==='receive') content.innerHTML=renderReceiveForm();
            else if(viewId==='qc-task') content.innerHTML=renderQCTask();
            else if(viewId==='issue') content.innerHTML=renderIssueForm();
            else if(viewId==='history') content.innerHTML=renderHistory();
            else if(viewId==='user-list') content.innerHTML=renderUserList();
        };

        function renderDashboard() {
            let total=window.localData.items.length, low=0, qc=0, avail=0;
            const lowStockItems = [];
            window.localData.items.forEach(i=>{ 
                const s = window.localData.stock.filter(x=>String(x.itemId) === String(i.id)), sum = s.reduce((a,b)=>a+b.qty,0); 
                if(sum<=(i.minStock||0)&&(i.minStock||0)>0) { low++; lowStockItems.push({ ...i, currentStock: sum }); }
            });

            const recentTrans = window.localData.transactions.slice(0, 5);
            const typeMap = { 'RECEIVE': 'รับเข้า', 'ISSUE': 'เบิกจ่าย', 'QC_PASS': 'QC ผ่าน', 'QC_HOLD': 'กักกัน', 'QC_FAIL': 'QC ไม่ผ่าน' };
            const typeClasses = { 'RM': 'bg-emerald-100 text-emerald-600', 'FG': 'bg-indigo-100 text-indigo-600', 'PKG': 'bg-amber-100 text-amber-600' };

            return `

                    ${card('สินค้าใกล้หมด',low,'fa-exclamation-triangle',low>0?'text-red-600':'text-slate-800',low>0?'bg-red-50 text-red-500 animate-pulse':'bg-slate-50 text-slate-400')}
                    ${card('รอตรวจสอบ QC',qc,'fa-microscope','text-amber-500','bg-amber-50 text-amber-500')}
                    ${card('พร้อมเบิก (Lot)',avail,'fa-cubes','text-emerald-600','bg-emerald-50 text-emerald-600')}
                </div>
                <div class="space-y-8 text-center">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-red-50/30">
                            <h3 class="font-bold text-slate-800 text-center flex-1 ml-10">สินค้าที่ต้องสั่งเพิ่ม (Low Stock)</h3>
                            <span class="bg-red-100 text-red-600 text-[10px] font-bold px-2 py-1 rounded-full">${low} รายการ</span>

            if(!t.length)return `<div class="text-center py-20 flex flex-col items-center gap-4"><div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center text-slate-200 text-3xl border border-slate-100"><i class="fas fa-clipboard-check"></i></div><p class="text-slate-400 italic font-medium">ปัจจุบันไม่มีรายการงานรอตรวจสอบคุณภาพ</p></div>`; 
            return `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">${t.map(s=>{ const i=window.localData.items.find(x=>String(x.id) === String(s.itemId)); if(!i)return ''; 
                return `<div class="bg-white p-5 rounded-2xl shadow-sm border-t-4 border-t-amber-400 border border-slate-200 flex flex-col justify-between hover:shadow-md transition-all"><div class="mb-4"><div class="flex justify-between items-start gap-2"><h4 class="font-bold text-indigo-600 font-mono">${i.code}</h4><span class="text-[10px] bg-red-50 text-red-500 px-2 py-0.5 rounded-full font-bold border border-red-100">Exp: ${s.expDate}</span></div><div class="text-sm font-bold text-slate-700 mt-2">${i.name}</div><div class="mt-3 grid grid-cols-2 gap-2 text-[11px]"><div class="bg-slate-50 p-2 rounded-lg"><span class="text-slate-400 block mb-0.5">Lot No.</span><span class="font-mono font-bold text-slate-600">${s.lotNo}</span></div><div class="bg-slate-50 p-2 rounded-lg"><span class="text-slate-400 block mb-0.5">จำนวน</span><span class="font-bold text-slate-600">${s.qty.toLocaleString()} ${i.unit}</span></div></div></div><div class="flex gap-2 pt-2"><button onclick="qcAction('${s.id}','PASS','OK')" class="flex-1 bg-emerald-500 text-white py-2.5 rounded-xl text-sm font-bold shadow-sm hover:bg-emerald-600 transition-colors">Pass</button><button onclick="qcAction('${s.id}','HOLD','HOLD')" class="flex-1 bg-amber-100 text-amber-700 py-2.5 rounded-xl text-sm font-bold hover:bg-amber-200 transition-colors">Hold</button><button onclick="qcAction('${s.id}','FAIL','NG')" class="flex-1 bg-red-50 text-red-600 py-2.5 rounded-xl text-sm font-bold border border-red-100 hover:bg-red-100 transition-colors">Reject</button></div></div>`}).join('')}</div>`; 
        }
        
        function renderIssueForm() { 
            const now=new Date(); now.setMinutes(now.getMinutes()-now.getTimezoneOffset()); window.appState.issueDate=now.toISOString().slice(0,16); 
            const l=window.appState.issueCart.map((c,i)=>`<tr class="border-b transition-colors hover:bg-slate-50/30 text-center text-sm font-medium"><td class="p-3 font-bold text-primary text-left font-mono">${c.item.code}</td><td class="p-3 text-left font-medium text-slate-700">${c.item.name}</td><td class="p-3 text-center"><div class="font-bold text-slate-700">${c.displayQty} ${c.displayUnit}</div><div class="text-[10px] text-slate-400 italic">(= ${c.baseQty.toFixed(3)} ${c.unit})</div></td><td class="p-3 text-center"><button onclick="removeFromIssueCart(${i})" class="text-slate-300 hover:text-red-500 hover:bg-red-50 p-2 rounded-full transition-all"><i class="fas fa-trash-can"></i></button></td></tr>`).join(''); 
            return `<div class="max-w-4xl mx-auto space-y-6"><div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200"><div class="grid grid-cols-2 gap-6"><div><label class="text-xs font-bold text-slate-500 uppercase mb-2 block">Ref Doc (เลขอ้างอิงใบสั่งงาน)</label><input id="input-ref-doc" class="w-full border-slate-200 border p-3 rounded-xl font-bold placeholder-slate-300 focus:ring-2 focus:ring-primary outline-none transition-all" placeholder="เช่น JOB-2024-001" value="${window.appState.issueRefDoc}" onchange="window.appState.issueRefDoc=this.value"></div><div><label class="text-xs font-bold text-slate-500 uppercase mb-2 block">วันที่เบิก (ระบบบันทึกอัตโนมัติ)</label><input type="datetime-local" id="input-issue-date" class="w-full border-slate-200 border p-3 rounded-xl bg-slate-50 text-slate-500 cursor-not-allowed" value="${window.appState.issueDate}" disabled></div></div></div><div class="bg-indigo-50/50 p-6 rounded-2xl border border-indigo-100 flex flex-col md:flex-row gap-4 items-end"><div class="flex-grow w-full"><div><label class="text-xs font-bold text-indigo-400 uppercase mb-2 block">ระบุสินค้าที่ต้องการเบิก</label>${renderSearchableItemInput('issue-item')}</div></div><div class="w-full md:w-32"><label class="text-xs font-bold text-indigo-400 uppercase mb-2 block">จำนวน</label><input type="number" id="input-qty" class="w-full border-slate-200 border p-3 rounded-xl font-bold text-center focus:ring-2 focus:ring-primary outline-none" step="0.01"></div><div class="w-full md:w-32"><label class="text-xs font-bold text-indigo-400 uppercase mb-2 block">หน่วยเบิก</label><select id="input-unit" class="w-full border-slate-200 border p-3 rounded-xl bg-white focus:ring-2 focus:ring-primary outline-none"><option value="kg">kg</option><option value="g">g</option><option value="pcs">pcs</option><option value="ml">ml</option></select></div><button onclick="handleAddIssueItem()" class="w-full md:w-auto bg-primary text-white px-8 py-3 rounded-xl font-bold shadow-indigo-200 shadow-lg hover:bg-indigo-700 transition-all transform active:scale-95">เพิ่มในรายการ</button></div><div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden"><table class="w-full text-sm text-left border-collapse"><thead class="bg-slate-50/50 border-b text-center text-slate-500 font-bold uppercase text-[11px]"><tr><th class="p-4 text-left">รหัส</th><th class="text-left">ชื่อสินค้า</th><th>จำนวนที่เบิก</th><th>Action</th></tr></thead><tbody>${l.length?l:'<tr><td colspan="4" class="p-16 text-center flex flex-col items-center gap-2"><i class="fas fa-cart-shopping text-slate-100 text-5xl"></i><span class="text-slate-400 italic">ยังไม่มีสินค้าในรายการเบิก</span></td></tr>'}</tbody></table><div class="p-6 border-t text-right bg-slate-50/30"><button onclick="processIssueBatch()" class="bg-slate-800 text-white px-10 py-3.5 rounded-xl font-bold shadow-lg hover:bg-dark transition-all transform active:scale-95 ${!l.length?'opacity-50 cursor-not-allowed':''}" ${!l.length?'disabled':''}>ยืนยันการเบิกจ่ายสินค้า</button></div></div></div>`; 
        }

        function renderUserList() { const list=window.localData.users.map(u=>`<tr class="border-b hover:bg-slate-50 transition-colors text-center text-sm"><td class="p-4 text-left font-mono text-slate-600">${u.username}</td><td class="p-4 text-left font-bold text-slate-700">${u.name}</td><td class="p-4"><span class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full text-[10px] font-bold border border-indigo-100">${u.role}</span></td><td class="p-4"><button onclick="deleteUser('${u.id}')" class="text-slate-300 hover:text-red-500 p-2 rounded-full transition-colors"><i class="fas fa-trash-can"></i></button></td></tr>`).join(''); return `<div class="max-w-4xl mx-auto"><div class="flex justify-between items-center mb-6"><h3 class="text-xl font-bold text-slate-800"><i class="fas fa-users-gear text-primary mr-2"></i> จัดการผู้ใช้งาน</h3><button onclick="window.openUserManageModal()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition-all transform active:scale-95"><i class="fas fa-plus mr-2"></i> เพิ่มผู้ใช้ใหม่</button></div><div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden"><table class="w-full text-sm text-left border-collapse"><thead class="bg-slate-50/50 border-b text-center text-slate-500 font-bold uppercase text-[11px]"><tr><th class="p-4 text-left">Username</th><th class="text-left">ชื่อพนักงาน</th><th>ตำแหน่ง (Role)</th><th>Action</th></tr></thead><tbody>${list}</tbody></table></div></div>`; }
        function renderHistory() { const isAdmin = window.appState.currentUser.role === 'ADMIN', typeMap = { 'RECEIVE': 'รับเข้า', 'ISSUE': 'เบิกจ่าย', 'QC_PASS': 'QC ผ่าน', 'QC_HOLD': 'กักกัน', 'QC_FAIL': 'QC ไม่ผ่าน' }; return `<div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden"><table class="w-full text-sm text-left border-collapse"><thead class="bg-slate-50 sticky top-0 shadow-sm z-10 text-center text-slate-500 font-bold uppercase text-[11px]"><tr><th class="py-4 px-4">เวลา</th><th>ประเภท</th><th class="text-left">สินค้า</th><th>Lot</th><th>จำนวน</th><th>โดย</th><th>Note</th>${isAdmin ? '<th>ลบ</th>' : ''}</tr></thead><tbody>${window.localData.transactions.map(t => `<tr class="border-b hover:bg-slate-50 transition-colors text-center text-xs"><td class="p-3 text-[10px] text-slate-400 font-mono">${t.date}</td><td class="p-3"><span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${t.type.includes('REC')?'bg-emerald-100 text-emerald-700':t.type.includes('ISS')?'bg-indigo-100 text-indigo-700':'bg-amber-100 text-amber-700'}">${typeMap[t.type]||t.type}</span></td><td class="p-3 text-left font-medium text-slate-700">${t.item || 'Unknown'}</td><td class="p-3 font-mono text-[10px]"><span class="bg-slate-100 rounded px-2 py-0.5 border border-slate-200">${t.lot}</span></td><td class="p-3 font-bold ${t.qty<0?'text-red-500':'text-emerald-500'}">${t.qty > 0 ? '+' : ''}${t.qty.toFixed(2)}</td><td class="p-3 text-[10px] text-slate-500">${t.actionBy}</td><td class="p-3 text-[10px] text-slate-400">${t.note}</td>${isAdmin ? `<td class="p-3"><button onclick="deleteTransaction('${t.id}')" class="text-slate-300 hover:text-red-500 transition-colors p-2"><i class="fas fa-trash-can"></i></button></td>` : ''}</tr>`).join('')}</tbody></table></div>`; }
    </script>
</body>
</html>
