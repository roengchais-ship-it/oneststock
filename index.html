<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบริหารจัดการสต็อก (Onest stock)</title>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SheetJS for Excel Import -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Sarabun', 'sans-serif'] },
                    colors: {
                        primary: '#4f46e5', secondary: '#64748b', success: '#10b981', warning: '#f59e0b', danger: '#ef4444', dark: '#0f172a'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f1f5f9; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { background: rgba(255, 255, 255, 0.1); border-left: 4px solid #6366f1; color: white; }
        .nav-item { border-left: 4px solid transparent; color: #94a3b8; }
        .nav-item:hover { color: white; background: rgba(255, 255, 255, 0.05); }
        .dashboard-card { transition: all 0.3s ease; }
        .dashboard-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .progress-bar-bg { background-color: #e2e8f0; border-radius: 9999px; height: 6px; width: 100%; overflow: hidden; }
        .progress-bar-fill { height: 100%; border-radius: 9999px; transition: width 0.5s ease; }
        .login-bg { background-image: linear-gradient(135deg, #4f46e5 0%, #0f172a 100%); }
        .dropdown-item { transition: all 0.2s ease; }
        .dropdown-item:active { background-color: #e0e7ff; }
        
        .segmented-control { background: #f8fafc; border: 1px solid #e2e8f0; padding: 4px; border-radius: 12px; display: flex; gap: 2px; }
        .segmented-item { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; color: #64748b; border: 1px solid transparent; }
        .segmented-item:hover:not(.active) { background: #fff; color: #4f46e5; border-color: #f1f5f9; }
        .segmented-item.active { background: #fff; color: #4f46e5; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); border-color: #e2e8f0; }
        .badge-count { background: #f1f5f9; color: #94a3b8; padding: 1px 6px; border-radius: 6px; font-size: 11px; }
        .active .badge-count { background: #eef2ff; color: #4f46e5; }
        
        .voided-row { opacity: 0.6; filter: grayscale(0.5); text-decoration: line-through; }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-hidden h-screen w-screen relative">

    <!-- 1. LOADING SCREEN -->
    <div id="loading-screen" class="fixed inset-0 bg-slate-900 z-[60] flex flex-col items-center justify-center text-white transition-opacity duration-500">
        <i class="fas fa-circle-notch fa-spin text-5xl text-primary mb-4"></i>
        <h2 class="text-xl font-bold">กำลังเชื่อมต่อฐานข้อมูล Cloud...</h2>
        <p class="text-slate-400 text-sm mt-2">ตรวจสอบสิทธิ์การเข้าถึง</p>
    </div>

    <!-- 2. LOGIN SCREEN -->
    <div id="login-view" class="fixed inset-0 z-50 flex items-center justify-center login-bg hidden">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 m-4 fade-in">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary text-white rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-lg shadow-indigo-500/30">
                    <i class="fas fa-cubes"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800 uppercase tracking-tight">Onest stock</h1>
                <p class="text-slate-500 text-sm">เข้าสู่ระบบเพื่อใช้งาน</p>
            </div>

            <form onsubmit="window.handleLogin(event)" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2 text-left">ชื่อผู้ใช้งาน (Username)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"><i class="fas fa-user"></i></span>
                        <input type="text" name="username" class="w-full pl-10 pr-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary outline-none transition-all" placeholder="Username" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2 text-left">รหัสผ่าน (Password)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"><i class="fas fa-key"></i></span>
                        <input type="password" name="password" class="w-full pl-10 pr-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary outline-none transition-all" placeholder="Password" required>
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full bg-primary hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all transform active:scale-95 flex items-center justify-center gap-2">
                        เข้าสู่ระบบ <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </form>
            <div id="login-error" class="text-center text-xs text-red-500 mt-4 hidden"></div>
        </div>
    </div>

    <!-- 3. MAIN APP LAYOUT -->
    <div id="app-layout" class="flex h-screen w-full hidden opacity-0 transition-opacity duration-300">
        
        <!-- SIDEBAR -->
        <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-xl z-20">
            <div class="h-16 flex items-center px-6 border-b border-slate-800 bg-slate-900">
                <div class="w-8 h-8 bg-indigo-600 text-white rounded-lg flex items-center justify-center mr-3 shadow-lg">
                    <i class="fas fa-cubes"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg tracking-tight">Onest stock</h1>
                    <p class="text-[10px] text-emerald-400 font-medium uppercase tracking-wider"><i class="fas fa-wifi mr-1"></i> Online</p>
                </div>
            </div>
            <nav class="flex-1 overflow-y-auto py-6 px-2">
                <p class="px-4 text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">เมนูหลัก</p>
                <ul id="menu-list" class="space-y-1"></ul>
            </nav>
            <div class="p-4 border-t border-slate-800 bg-slate-900/50 cursor-pointer hover:bg-slate-800 transition-colors" onclick="window.openProfileModal()">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold shadow-lg ring-2 ring-slate-800">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold text-white truncate" id="current-user-name">Guest</p>
                        <p class="text-xs text-indigo-400 font-medium truncate" id="current-user-role">Role</p>
                    </div>
                    <i class="fas fa-cog text-slate-500 text-xs"></i>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#f1f5f9]">
            <header class="h-16 bg-white/90 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-8 z-10 sticky top-0 shadow-sm">
                <div class="flex items-center gap-4">
                    <h2 class="text-xl font-bold text-slate-800" id="page-title">Dashboard</h2>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-bold text-slate-700 leading-tight" id="topbar-user-name">User</p>
                        <span class="text-[10px] bg-indigo-50 text-primary px-2 py-0.5 rounded border border-indigo-100 uppercase" id="topbar-user-role">Role</span>
                    </div>
                    <div class="h-8 w-px bg-slate-200 mx-2"></div>
                    <button onclick="window.logout()" class="text-slate-400 hover:text-red-500 transition-colors p-2" title="ออกจากระบบ">
                        <i class="fas fa-sign-out-alt text-lg"></i>
                    </button>
                </div>
            </header>
            <div id="content-area" class="flex-1 overflow-y-auto p-8 relative scroll-smooth"></div>
        </main>
    </div>

    <!-- MODALS -->
    <!-- Profile Modal -->
    <div id="profile-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-slate-900/60 backdrop-blur-sm fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-96 overflow-hidden border border-white/20">
            <div class="bg-gradient-to-r from-slate-700 to-slate-900 px-6 py-4 flex justify-between items-center">
                <h3 class="text-lg font-bold text-white"><i class="fas fa-user-circle mr-2"></i> โปรไฟล์ของฉัน</h3>
                <button onclick="window.closeModal('profile-modal')" class="text-slate-400 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <input type="hidden" id="profile-id">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">ชื่อผู้ใช้งาน (Username)</label>
                    <input type="text" id="profile-username" class="w-full border p-2 rounded-lg bg-slate-100 text-slate-500 cursor-not-allowed" readonly>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">ชื่อที่แสดง (Display Name)</label>
                    <input type="text" id="profile-name" class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-primary outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">รหัสผ่านใหม่ (ว่างไว้ถ้าไม่เปลี่ยน)</label>
                    <input type="password" id="profile-password" class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-primary outline-none" placeholder="New Password">
                </div>
                <div class="pt-2">
                    <button onclick="window.saveProfile()" class="w-full bg-primary hover:bg-indigo-700 text-white py-2 rounded-lg font-bold shadow transition-all">บันทึกการเปลี่ยนแปลง</button>
                </div>
            </div>
        </div>
    </div>

    <!-- User Management Modal -->
    <div id="user-manage-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-slate-900/60 backdrop-blur-sm fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden border border-white/20">
            <div class="bg-gradient-to-r from-blue-600 to-cyan-600 px-6 py-4 flex justify-between items-center">
                <h3 class="text-lg font-bold text-white"><i class="fas fa-users-cog mr-2"></i> เพิ่มผู้ใช้งานใหม่</h3>
                <button onclick="window.closeModal('user-manage-modal')" class="text-blue-200 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <form onsubmit="window.handleCreateUser(event)" class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Username</label><input type="text" name="new_username" class="w-full border p-2 rounded-lg" required></div>
                    <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Password</label><input type="text" name="new_password" class="w-full border p-2 rounded-lg" required></div>
                </div>
                <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">ชื่อพนักงาน</label><input type="text" name="new_name" class="w-full border p-2 rounded-lg" required></div>
                <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">ตำแหน่ง (Role)</label><select name="new_role" class="w-full border p-2 rounded-lg bg-white"><option value="STOCK">Stock</option><option value="QC">QC</option><option value="ADMIN">Admin</option></select></div>
                <div class="pt-2"><button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-bold shadow">สร้างผู้ใช้</button></div>
            </form>
        </div>
    </div>

    <!-- Min Stock Modal -->
    <div id="min-stock-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-slate-900/60 backdrop-blur-sm fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-96 overflow-hidden border border-white/20">
            <div class="bg-gradient-to-r from-orange-500 to-amber-500 px-6 py-4"><h3 class="text-lg font-bold text-white"><i class="fas fa-bell mr-2"></i> ตั้งค่า Min Stock</h3></div>
            <div class="p-6">
                <input type="hidden" id="modal-item-id">
                <div class="mb-6 text-center"><label class="block text-xs font-bold text-slate-400 uppercase mb-2" id="modal-item-name">สินค้า</label><input type="number" id="modal-min-stock-input" class="w-full border-2 border-slate-200 rounded-xl p-3 text-center text-3xl font-bold text-slate-700 focus:border-orange-400 outline-none" min="0"></div>
                <div class="flex justify-end gap-3"><button onclick="window.closeModal('min-stock-modal')" class="px-5 py-2.5 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 font-bold">ยกเลิก</button><button onclick="window.saveMinStockModal()" class="px-5 py-2.5 bg-orange-500 text-white rounded-lg hover:bg-orange-600 font-bold shadow-lg">บันทึก</button></div>
            </div>
        </div>
    </div>

    <!-- Edit Item Modal -->
    <div id="edit-item-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-slate-900/60 backdrop-blur-sm fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden border border-white/20">
            <div class="bg-gradient-to-r from-blue-600 to-indigo-600 px-6 py-4 flex justify-between items-center">
                <h3 class="text-lg font-bold text-white"><i class="fas fa-edit mr-2"></i> แก้ไขข้อมูลสินค้า</h3>
                <button onclick="window.closeModal('edit-item-modal')" class="text-indigo-200 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <input type="hidden" id="edit-item-id">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">รหัส (แก้ไขไม่ได้)</label><input type="text" id="edit-item-code" class="w-full border border-slate-300 rounded-lg px-3 py-2 bg-slate-100 cursor-not-allowed" readonly></div>
                    <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Min Stock</label><input type="number" id="edit-item-min" class="w-full border border-slate-300 rounded-lg px-3 py-2 font-bold" min="0"></div>
                </div>
                <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">ชื่อสินค้า</label><input type="text" id="edit-item-name" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">ประเภท</label><select id="edit-item-type" class="w-full border border-slate-300 rounded-lg px-3 py-2 bg-white"><option value="RM">RM</option><option value="FG">FG</option><option value="PKG">PKG</option></select></div>
                    <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">หน่วย</label><select id="edit-item-unit" class="w-full border border-slate-300 rounded-lg px-3 py-2 bg-white"><option value="kg">kg</option><option value="pcs">pcs</option><option value="set">set</option><option value="g">g</option><option value="ml">ml</option></select></div>
                </div>
                <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
                    <button onclick="window.closeModal('edit-item-modal')" class="px-5 py-2.5 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 font-bold">ยกเลิก</button>
                    <button onclick="window.saveEditItem()" class="px-5 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-bold shadow-lg">บันทึก</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPT Block -->
    <script>
        // GLOBAL DATA & STATE
        window.localData = { items: [], stock: [], transactions: [], users: [] };
        window.appState = { 
            currentUser: null, 
            currentView: 'dashboard', 
            issueCart: [], 
            issueRefDoc: '', 
            issueDate: '',
            inventoryFilter: 'ALL', 
            inventoryLowStockOnly: false,
            receiveHistoryFilterDate: '',
            itemMasterSearch: '',
            itemMasterPage: 1
        };

        // --- CORE UI HELPERS ---
        window.checkPerm = function(act) { 
            if (!window.appState.currentUser) return false;
            const r = window.appState.currentUser.role; 
            return act === 'manage_item' ? (r === 'ADMIN' || r === 'STOCK') : false; 
        };

        window.renderSearchableItemInput = function(cid) { 
            return `
                <div class="relative group w-full" id="search-container-${cid}">
                    <div class="flex items-center border border-slate-300 rounded-lg bg-white overflow-hidden focus-within:border-indigo-500 focus-within:ring-4 focus-within:ring-indigo-500/10 transition-all shadow-sm">
                        <div class="bg-slate-50 px-3 py-2.5 border-r border-slate-200 text-slate-400"><i class="fas fa-search"></i></div>
                        <input type="text" id="search-input-${cid}" class="w-full px-3 py-2.5 outline-none text-slate-700 placeholder-slate-400" placeholder="ค้นหาด้วยชื่อหรือรหัส..." autocomplete="off" onfocus="window.openDropdown('${cid}')" oninput="window.handleSearchInput('${cid}')" onblur="window.handleInputBlur('${cid}')">
                        <div id="clear-btn-${cid}" class="hidden cursor-pointer px-3 text-slate-400 hover:text-danger transition-colors" onclick="window.clearSelection('${cid}')"><i class="fas fa-times-circle"></i></div>
                        <input type="hidden" name="itemId" id="hidden-item-id-${cid}">
                    </div>
                    <div id="dropdown-list-${cid}" class="hidden absolute z-50 w-full bg-white border border-slate-200 mt-1 rounded-lg shadow-xl max-h-60 overflow-y-auto custom-scrollbar animate-fade-in-down"></div>
                </div>`; 
        };

        window.generateDropdownItemsHTML = function(cid, txt = '') { 
            const l = window.localData.items.filter(i => i.code.toLowerCase().includes(txt.toLowerCase()) || i.name.toLowerCase().includes(txt.toLowerCase())); 
            if(!l.length) return `<div class="p-4 text-slate-400 text-center text-sm">ไม่พบสินค้า</div>`;
            return l.map(i => `<div class="dropdown-item cursor-pointer hover:bg-indigo-50 px-4 py-3 border-b border-slate-100 last:border-0" onmousedown="window.selectDropdownItem('${cid}','${i.id}','${i.code}','${i.name}')"><div class="flex justify-between"><span class="font-bold text-indigo-600 font-mono">${i.code}</span><span class="text-xs bg-slate-200 px-2 rounded">${i.type}</span></div><div class="text-sm text-slate-700">${i.name}</div></div>`).join(''); 
        };

        window.openDropdown = function(cid) { 
            const el = document.getElementById('dropdown-list-' + cid);
            if(el) { 
                el.innerHTML = window.generateDropdownItemsHTML(cid, document.getElementById('search-input-' + cid).value); 
                el.classList.remove('hidden'); 
            }
        };

        window.handleSearchInput = function(cid) { 
            document.getElementById('hidden-item-id-' + cid).value = ''; 
            document.getElementById('clear-btn-' + cid).classList.remove('hidden'); 
            const val = document.getElementById('search-input-' + cid).value;
            const list = document.getElementById('dropdown-list-' + cid);
            list.innerHTML = window.generateDropdownItemsHTML(cid, val);
            list.classList.remove('hidden'); 
        };

        window.handleInputBlur = function(cid) { 
            setTimeout(() => { 
                const h = document.getElementById('hidden-item-id-' + cid);
                const i = document.getElementById('search-input-' + cid);
                const l = document.getElementById('dropdown-list-' + cid);
                const c = document.getElementById('clear-btn-' + cid);
                if(l) l.classList.add('hidden'); 
                if(h && !h.value && i) { i.value = ''; if(c) c.classList.add('hidden'); } 
            }, 300); 
        };

        window.selectDropdownItem = function(cid, id, c, n) { 
            document.getElementById('hidden-item-id-' + cid).value = id; 
            document.getElementById('search-input-' + cid).value = `${c} : ${n}`; 
            document.getElementById('dropdown-list-' + cid).classList.add('hidden'); 
            document.getElementById('clear-btn-' + cid).classList.remove('hidden'); 
        };

        window.clearSelection = function(cid) { 
            document.getElementById('hidden-item-id-' + cid).value = ''; 
            document.getElementById('search-input-' + cid).value = ''; 
            document.getElementById('clear-btn-' + cid).classList.add('hidden'); 
        };

        // --- HELPER FUNCTIONS FOR UI HANDLERS ---
        window.openMinStockModal = (id) => {
            const item = window.localData.items.find(x => String(x.id) === String(id));
            if(!item) return;
            document.getElementById('modal-item-id').value = id;
            document.getElementById('modal-item-name').innerText = `${item.code} : ${item.name}`;
            document.getElementById('modal-min-stock-input').value = item.minStock || 0;
            document.getElementById('min-stock-modal').classList.remove('hidden');
        };

        window.openEditItemModal = (id) => {
            const item = window.localData.items.find(x => String(x.id) === String(id));
            if(!item) return;
            document.getElementById('edit-item-id').value = id;
            document.getElementById('edit-item-code').value = item.code;
            document.getElementById('edit-item-name').value = item.name;
            document.getElementById('edit-item-type').value = item.type;
            document.getElementById('edit-item-unit').value = item.unit;
            document.getElementById('edit-item-min').value = item.minStock || 0;
            document.getElementById('edit-item-modal').classList.remove('hidden');
        };

                type: d.get('type'),

        window.handleReceiveSubmit = (e) => {
            e.preventDefault();
            const d = new FormData(e.target);
            const itemId = d.get('itemId');
            if(!itemId) return window.alertError("กรุณาเลือกสินค้า");
            window.receiveItem({
                itemId: itemId,

            window.clearSelection('receive-item');

                if(window.appState.currentView === 'receive') window.renderView('receive');
            }, 1000);

        window.handleAddIssueItem = () => {
            const itemId = document.getElementById('hidden-item-id-issue-item').value;
            const qtyInput = document.getElementById('input-qty').value;
            const qty = parseFloat(qtyInput);
            const unit = document.getElementById('input-unit').value;
            
            if(!itemId || isNaN(qty) || qty <= 0) return window.alertError("กรุณากรอกข้อมูลให้ครบถ้วน");

            const item = window.localData.items.find(x => String(x.id) === String(itemId));
            if(!item) return;

            const availableLots = window.localData.stock.filter(s => String(s.itemId) === String(itemId) && s.status === 'AVAILABLE' && s.qty > 0);
            const totalAvailable = availableLots.reduce((sum, lot) => sum + lot.qty, 0);
            
            const factor = window.getConversionFactor(unit, item.unit);
            const baseQty = qty * factor;

            if (baseQty > totalAvailable) {
                return window.alertError(`สินค้าไม่เพียงพอเบิก!\nมีพร้อมใช้ทั้งหมด: ${totalAvailable.toFixed(2)} ${item.unit}\nที่คุณต้องการ: ${baseQty.toFixed(2)} ${item.unit}`);
            }

            window.appState.issueCart.push({
                itemId, item, displayQty: qty, displayUnit: unit, baseQty, unit: item.unit
            });

            document.getElementById('input-qty').value = '';
            window.clearSelection('issue-item');
            window.renderView('issue');
        };

        window.handleReceiveExcelImport = function(event) {

                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);
                    if (jsonData.length === 0) return alertError("ไฟล์ว่างเปล่า");
                    
                    let successCount = 0;
                    let errorCount = 0;
                    
                    for (const row of jsonData) {
                        const code = (row["รหัสสินค้า"] || row["Code"] || "").toString().trim().toUpperCase();
                        const lotNo = (row["Lot No"] || row["Lot"] || "OLD-DATA").toString().trim();
                        const qty = parseFloat(row["จำนวน"] || row["Qty"] || 0);
                        const unit = (row["หน่วย"] || row["Unit"] || "pcs").toString().trim().toLowerCase();
                        const expDate = (row["วันหมดอายุ"] || row["Exp Date"] || "2099-12-31").toString().trim();
                        const location = (row["Location"] || row["Loc"] || "MAIN").toString().trim();

                        const item = window.localData.items.find(i => i.code === code);
                        
                        if (item && qty > 0) {
                            await window.receiveItem({
                                itemId: item.id,
                                lotNo: lotNo,
                                qty: qty,
                                unit: unit,
                                expDate: expDate,
                                location: location
                            });
                            successCount++;
                        } else {
                            errorCount++;
                        }
                    }
                    
                    alertSuccess(`นำเข้าสำเร็จ ${successCount} รายการ${errorCount > 0 ? ` (ข้าม ${errorCount} รายการเนื่องจากไม่พบรหัสสินค้า)` : ''}`);

            };

        };

                        <tbody>${printData.map(item => `<tr><td style="border: 1px solid #000; padding: 6px; text-align: left; font-family: monospace;">${item.code}</td><td style="border: 1px solid #000; padding: 6px; text-align: left;">${item.name}</td><td style="border: 1px solid #000; padding: 6px; text-align: center;">${item.balance}</td><td style="border: 1px solid #000; padding: 6px; text-align: center;">${item.unit}</td><td style="border: 1px solid #000; padding: 6px;"></td></tr>`).join('')}</tbody>

    <!-- SCRIPT 2: FIREBASE MODULE -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, setDoc, getDoc, onSnapshot, query, orderBy, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAqOMC8fVaRMDB5aPpoImYSVFwjU1d_99k",
            authDomain: "onsetstock.firebaseapp.com",
            projectId: "onsetstock",
            storageBucket: "onsetstock.firebasestorage.app",
            messagingSenderId: "159241390751",
            appId: "1:159241390751:web:58bef364f4678621ac70aa",
            measurementId: "G-SKB9T0KMEP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'factory-os-main'; 

        window.auth = auth; window.db = db; window.appId = appId;
        window.db_doc = doc; window.db_setDoc = setDoc; window.db_getDoc = getDoc; window.db_deleteDoc = deleteDoc;

        async function initApp() {
            try {
                await signInAnonymously(auth); 
                const basePath = `artifacts/${appId}/public/data`;
                onSnapshot(collection(db, basePath, 'items'), (s) => { window.localData.items = s.docs.map(d=>({id:d.id,...d.data()})); refreshView(); });
                onSnapshot(collection(db, basePath, 'stock'), (s) => { window.localData.stock = s.docs.map(d=>({id:d.id,...d.data()})); refreshView(); });
                onSnapshot(collection(db, basePath, 'transactions'), (s) => { window.localData.transactions = s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.timestamp||0)-(a.timestamp||0)); refreshView(); });
                onSnapshot(collection(db, basePath, 'users'), async (s) => { 
                    window.localData.users = s.docs.map(d=>({id:d.id,...d.data()}));
                    const seeds = [{u:'admin',p:'1234',n:'System Admin',r:'ADMIN'},{u:'stock',p:'1234',n:'Stock Manager',r:'STOCK'},{u:'qc',p:'1234',n:'QC Inspector',r:'QC'}];
                    for (const u of seeds) { if (!window.localData.users.find(x => x.username === u.u)) { await addDoc(collection(db, basePath, 'users'), {username:u.u,password:u.p,name:u.n,role:u.r}); } }
                    if (auth.currentUser) {
                        const sessDoc = await getDoc(doc(db, `artifacts/${appId}/users/${auth.currentUser.uid}/session`, 'current'));
                        if (sessDoc.exists()) {
                            const data = sessDoc.data();
                            const user = window.localData.users.find(u => u.username === data.username);
                            if (user) {
                                window.appState.currentUser = user;
                                document.getElementById('login-view').classList.add('hidden');
                                document.getElementById('app-layout').classList.remove('hidden');
                                document.getElementById('app-layout').classList.remove('opacity-0');
                                const hash = window.location.hash.substring(1);
                                window.renderView(hash || 'dashboard');
                            }
                        }
                    }
                    refreshView(); 
                });
                document.getElementById('loading-screen').classList.add('hidden');
                if(!window.appState.currentUser) document.getElementById('login-view').classList.remove('hidden');
            } catch (e) { console.error(e); }
        }
        function refreshView() { if(window.appState.currentUser) window.renderView(window.appState.currentView); }
        initApp();

        window.createItem = async (d, silent=false) => { 
            try { 
                await addDoc(collection(db, `artifacts/${appId}/public/data/items`), { code: d.code.toUpperCase(), name: d.name, type: d.type, unit: d.unit, minStock: parseInt(d.minStock)||0 }); 
                if(!silent) { alertSuccess('สำเร็จ'); window.renderView('item-master'); }
            } catch(e){ if(!silent) alertError(e.message); } 
        };
        window.deleteItem = async (id) => { try { await deleteDoc(doc(db, `artifacts/${appId}/public/data/items`, id)); alertSuccess('ลบแล้ว'); } catch(e){alertError(e.message)} };
        window.saveEditItem = async () => { const id=document.getElementById('edit-item-id').value; try { await updateDoc(doc(db, `artifacts/${appId}/public/data/items`, id), { name: document.getElementById('edit-item-name').value, type: document.getElementById('edit-item-type').value, unit: document.getElementById('edit-item-unit').value, minStock: parseInt(document.getElementById('edit-item-min').value) }); window.closeModal('edit-item-modal'); alertSuccess('แก้ไขแล้ว'); } catch(e){alertError(e.message)} };
        window.saveMinStockModal = async () => { const id=document.getElementById('modal-item-id').value; try { await updateDoc(doc(db, `artifacts/${appId}/public/data/items`, id), { minStock: parseInt(document.getElementById('modal-min-stock-input').value) }); window.closeModal('min-stock-modal'); } catch(e){alertError(e.message)} };
        
        window.receiveItem = async (d) => { 
            const t=new Date().toISOString().split('T')[0], item = window.localData.items.find(x => String(x.id) === String(d.itemId)); 
            if(!item) return alertError("ไม่พบข้อมูลสินค้า"); 
            const factor = window.getConversionFactor(d.unit, item.unit), convertedQty = parseFloat(d.qty) * factor; 
            try { 
                const stockRef = await addDoc(collection(db, `artifacts/${appId}/public/data/stock`), { itemId: d.itemId, lotNo: d.lotNo, qty: convertedQty, unit: item.unit, status: 'WAIT_QC', expDate: d.expDate, location: d.location, receivedDate: t, timestamp: Date.now() }); 
                await logTrans('RECEIVE', d.itemId, d.lotNo, convertedQty, item.unit, `Loc: ${d.location} (Input: ${d.qty} ${d.unit})`, null, stockRef.id); 
                return true;
            } catch(e){ throw e; } 
        };

        async function logTrans(type, itemId, lotNo, qty, unit, note, cDate, stockId) { 
            const i = window.localData.items.find(x=>String(x.id) === String(itemId)); 
            await addDoc(collection(db, `artifacts/${appId}/public/data/transactions`), { 
                type, itemId, item: i?`${i.code} - ${i.name}`:'?', lot: lotNo, qty, 
                unit: unit || (i ? i.unit : '-'), 
                actionBy: window.appState.currentUser.name, note: note||'-', 
                date: (cDate?new Date(cDate):new Date()).toLocaleString('th-TH'), 
                timestamp: Date.now(), 
                status: 'ACTIVE',
                stockId: stockId || null
            }); 
        }

        window.qcAction = async (id, act, rem) => { 
            const s=window.localData.stock.find(x=>x.id===id); 
            if(!s)return; 
            let st=act==='PASS'?'AVAILABLE':(act==='HOLD'?'HOLD':'REJECT'); 
            try { 
                await updateDoc(doc(db, `artifacts/${appId}/public/data/stock`, id), { status: st }); 
                await logTrans('QC_'+act, s.itemId, s.lotNo, 0, s.unit, `${s.status}->${st} (${rem})`, null, id); 
                alertSuccess('บันทึก QC'); 
            } catch(e){alertError(e.message)} 
        };

        window.processIssueBatch = async () => { 
            if(!window.appState.issueCart.length || !window.appState.issueRefDoc) return alertError('ข้อมูลไม่ครบ'); 
            try { 
                for(let c of window.appState.issueCart) {
                    const availableLots = window.localData.stock.filter(s => String(s.itemId) === String(c.itemId) && s.status === 'AVAILABLE' && s.qty > 0);
                    const totalAvailable = availableLots.reduce((sum, lot) => sum + lot.qty, 0);
                    if (c.baseQty > totalAvailable) {
                        return window.alertError(`สินค้า "${c.item.name}" มีไม่เพียงพอในคลังแล้วในขณะนี้ (พร้อมใช้: ${totalAvailable.toFixed(2)})`);
                    }
                }

                for(let c of window.appState.issueCart) { 
                    const lots = window.localData.stock.filter(s=>String(s.itemId) === String(c.itemId) && s.status==='AVAILABLE' && s.qty>0).sort((a,b)=>new Date(a.expDate)-new Date(b.expDate)); 
                    let rem = c.baseQty; 
                    for(let l of lots) { 
                        if(rem<=0) break; 
                        let deduct = Math.min(l.qty, rem); 
                        await updateDoc(doc(db, `artifacts/${appId}/public/data/stock`, l.id), { qty: l.qty - deduct }); 
                        await logTrans('ISSUE', c.itemId, l.lotNo, -deduct, l.unit, `Ref: ${window.appState.issueRefDoc}`, window.appState.issueDate, l.id); 
                        rem -= deduct; 
                    } 
                } 
                window.appState.issueCart=[]; window.appState.issueRefDoc=''; 
                alertSuccess('เบิกสำเร็จ'); window.renderView('dashboard'); 
            } catch(e){alertError(e.message)} 
        };

        window.voidTransaction = async (id) => {
            const trans = window.localData.transactions.find(t => t.id === id);
            if (!trans || trans.status === 'VOIDED') return;
            if (window.appState.currentUser.role !== 'ADMIN') return alertError('ไม่มีสิทธิ์ Void รายการ (Admin Only)');
            
            if (!confirm(`ต้องการยกเลิกรายการนี้? ระบบจะทำการคืนสต็อกจำนวน ${Math.abs(trans.qty)} หน่วย เข้าสู่ Lot ${trans.lot}`)) return;

            try {
                let stockDoc = window.localData.stock.find(s => s.id === trans.stockId);
                if (!stockDoc) {
                    stockDoc = window.localData.stock.find(s => String(s.itemId) === String(trans.itemId) && s.lotNo === trans.lot);
                }

                if (trans.type === 'RECEIVE') {
                    if (stockDoc) {
                        const newQty = Math.max(0, stockDoc.qty - trans.qty);
                        await updateDoc(doc(db, `artifacts/${appId}/public/data/stock`, stockDoc.id), { qty: newQty });
                    }
                } else if (trans.type === 'ISSUE') {
                    if (stockDoc) {
                        await updateDoc(doc(db, `artifacts/${appId}/public/data/stock`, stockDoc.id), { qty: stockDoc.qty + Math.abs(trans.qty) });
                    } else {
                        return alertError("ไม่พบข้อมูล Lot เดิมในระบบ ไม่สามารถคืนค่าสต็อกได้");
                    }
                }

                await updateDoc(doc(db, `artifacts/${appId}/public/data/transactions`, id), { 
                    status: 'VOIDED',
                    voidBy: window.appState.currentUser.name,
                    voidAt: new Date().toLocaleString('th-TH')
                });

                alertSuccess('ยกเลิกรายการและคืนสต็อกสำเร็จ');
            } catch (e) {
                alertError("Void Error: " + e.message);
            }
        };

        window.saveProfile = async () => { const id=document.getElementById('profile-id').value, name=document.getElementById('profile-name').value, pass=document.getElementById('profile-password').value, dObj={name}; if(pass)dObj.password=pass; try { await updateDoc(doc(db,`artifacts/${appId}/public/data/users`,id),dObj); window.appState.currentUser.name=name; window.closeModal('profile-modal'); alertSuccess('บันทึกแล้ว'); }catch(e){alertError(e.message)} };
        window.handleCreateUser = async (e) => { e.preventDefault(); const d=new FormData(e.target); if(window.localData.users.find(u=>u.username===d.get('new_username')))return alertError('Username ซ้ำ'); try { await addDoc(collection(db,`artifacts/${appId}/public/data/users`),{username:d.get('new_username'),password:d.get('new_password'),name:d.get('new_name'),role:d.get('new_role')}); window.closeModal('user-manage-modal'); alertSuccess('สร้างแล้ว'); window.renderView('user-list'); }catch(e){alertError(e.message)} };
        window.deleteUser = async (id) => { if(confirm('ลบผู้ใช้งานนี้?')) { try { await deleteDoc(doc(db,`artifacts/${appId}/public/data/users`,id)); alertSuccess('ลบแล้ว'); window.renderView('user-list'); }catch(e){alertError(e.message)} } };
        window.deleteTransaction = async (id) => { if (window.appState.currentUser.role !== 'ADMIN') return alertError('ไม่มีสิทธิ์'); if (confirm('ลบประวัติรายการนี้ถาวร? (จะไม่มีการคืนสต็อก)')) { try { await deleteDoc(doc(db, `artifacts/${appId}/public/data/transactions`, id)); alertSuccess('ลบประวัติสำเร็จ'); window.renderView('history'); } catch (e) { alertError(e.message); } } };
    </script>

    <!-- SCRIPT 3: RENDERERS -->
    <script>
        window.renderView = (viewId) => {
            window.appState.currentView = viewId;
            window.location.hash = viewId;
            const user = window.appState.currentUser;
            if(!user) return;
            document.getElementById('menu-list').innerHTML = (menuConfig[user.role]||[]).map(m => `<li onclick="window.renderView('${m.id}')" class="nav-item ${viewId===m.id?'active':''} group flex items-center gap-3 px-4 py-3 cursor-pointer rounded-lg transition-all mb-1 mx-2 text-slate-300 hover:text-white"><i class="fas ${m.i} w-6 text-center text-lg"></i><span class="font-medium text-sm">${m.l}</span></li>`).join('');
            document.getElementById('current-user-role').innerText = user.role;
            document.getElementById('current-user-name').innerText = user.name;
            document.getElementById('topbar-user-name').innerText = user.name;
            document.getElementById('topbar-user-role').innerText = user.role;
            const content = document.getElementById('content-area');
            if(viewId==='dashboard') content.innerHTML=renderDashboard();
            else if(viewId==='inventory-status') content.innerHTML=renderInventoryStatus();
            else if(viewId==='item-master') content.innerHTML=renderItemMaster();
            else if(viewId==='receive') content.innerHTML=renderReceiveForm();
            else if(viewId==='qc-task') content.innerHTML=renderQCTask();
            else if(viewId==='issue') content.innerHTML=renderIssueForm();
            else if(viewId==='history') content.innerHTML=renderHistory();
            else if(viewId==='user-list') content.innerHTML=renderUserList();
        };

        const menuConfig = {
            ADMIN: [{id:'dashboard',l:'ภาพรวม',i:'fa-chart-pie'},{id:'inventory-status',l:'ยอดคงเหลือ',i:'fa-boxes-stacked'},{id:'item-master',l:'ข้อมูลสินค้า',i:'fa-box'},{id:'receive',l:'รับของเข้า',i:'fa-dolly'},{id:'qc-task',l:'ตรวจ QC',i:'fa-clipboard-check'},{id:'issue',l:'เบิกจ่าย',i:'fa-truck-fast'},{id:'history',l:'ประวัติ',i:'fa-clock-rotate-left'}, {id:'user-list',l:'จัดการผู้ใช้',i:'fa-users-cog'}],
            STOCK: [{id:'dashboard',l:'ภาพรวม',i:'fa-chart-pie'},{id:'inventory-status',l:'ยอดคงเหลือ',i:'fa-boxes-stacked'},{id:'item-master',l:'ข้อมูลสินค้า',i:'fa-box'},{id:'receive',l:'รับของเข้า',i:'fa-dolly'},{id:'issue',l:'เบิกจ่าย',i:'fa-truck-fast'},{id:'history',l:'ประวัติ',i:'fa-clock-rotate-left'}],
            QC: [{id:'qc-task',l:'งานรอตรวจ',i:'fa-clipboard-check'},{id:'dashboard',l:'ดูสต็อก',i:'fa-search'},{id:'inventory-status',l:'ยอดคงเหลือ',i:'fa-boxes-stacked'}]
        };

        function renderDashboard() {
            let total=window.localData.items.length, low=0, qc=0, avail=0;
            const lowStockItems = [];
            window.localData.items.forEach(i=>{ 
                const s = window.localData.stock.filter(x=>String(x.itemId) === String(i.id)), sum = s.reduce((a,b)=>a+b.qty,0); 
                if(sum<=(i.minStock||0)&&(i.minStock||0)>0) { low++; lowStockItems.push({ ...i, currentStock: sum }); }
            });
            window.localData.stock.forEach(s=>{ if(s.qty>0){ const it=window.localData.items.find(x=>String(x.id) === String(s.itemId)); if(it){ if(s.status==='WAIT_QC')qc++; if(s.status==='AVAILABLE')avail++; } } });
            
            const activeTrans = window.localData.transactions.filter(t => t.status !== 'VOIDED');
            const recentTrans = activeTrans.slice(0, 5);
            const typeMap = { 'RECEIVE': 'รับเข้า', 'ISSUE': 'เบิกจ่าย', 'QC_PASS': 'QC ผ่าน', 'QC_HOLD': 'กักกัน', 'QC_FAIL': 'QC ไม่ผ่าน' };
            
            return `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8 text-center">
                    ${card('สินค้าทั้งหมด',total,'fa-boxes','text-slate-800','bg-indigo-50 text-indigo-600')}
                    ${card('สินค้าใกล้หมด',low,'fa-exclamation-triangle',low>0?'text-red-600':'text-slate-800',low>0?'bg-red-50 text-red-500 animate-pulse':'bg-slate-50 text-slate-400')}
                    ${card('รอตรวจสอบ QC',qc,'fa-microscope','text-amber-500','bg-amber-50 text-amber-500')}
                    ${card('พร้อมเบิก (Lot)',avail,'fa-cubes','text-emerald-600','bg-emerald-50 text-emerald-600')}
                </div>
                <div class="space-y-8">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-red-50/30">
                            <h3 class="font-bold text-slate-800 text-center flex-1 ml-10 text-lg">สินค้าที่ต้องสั่งเพิ่ม (Low Stock)</h3>
                            <span class="bg-red-100 text-red-600 text-[10px] font-bold px-2 py-1 rounded-full">${low} รายการ</span>
                        </div>
                        <div class="overflow-x-auto"><table class="w-full text-sm text-left border-collapse"><thead class="bg-slate-50/30 text-xs text-slate-400 uppercase text-center"><tr><th class="py-3 px-6 border-b">รหัสสินค้า</th><th class="py-3 px-6 text-left border-b">ชื่อสินค้า</th><th class="py-3 px-6 border-b">คงเหลือ</th><th class="py-3 px-6 border-b">ค่า Min</th><th class="py-3 px-6 border-b">หน่วย</th></tr></thead><tbody>
                        ${lowStockItems.slice(0, 5).map(i => `<tr class="border-b border-slate-50 hover:bg-red-50/30 transition-colors text-center text-sm font-medium"><td class="px-6 py-4 font-mono font-bold text-indigo-600 text-left">${i.code}</td><td class="px-6 py-4 text-left text-slate-700">${i.name}</td><td class="px-6 py-4 text-red-600 font-bold">${i.currentStock.toFixed(2)}</td><td class="px-6 py-4 text-slate-400 font-mono">${i.minStock}</td><td class="px-6 py-4 text-xs uppercase text-slate-400 text-center">${i.unit}</td></tr>`).join('')}
                        ${lowStockItems.length === 0 ? '<tr><td colspan="5" class="py-20 text-center text-emerald-500 italic font-medium">สต็อกสินค้าเพียงพอทุกรายการ</td></tr>' : ''}
                        </tbody></table></div>
                    </div>
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                            <h3 class="font-bold text-slate-800 text-center flex-1 ml-10 text-lg">ความเคลื่อนไหวล่าสุด (Recent Activities)</h3>
                            <button onclick="window.renderView('history')" class="text-xs font-bold text-primary hover:underline">ดูทั้งหมด</button>
                        </div>
                        <div class="overflow-x-auto"><table class="w-full text-sm text-left border-collapse"><thead class="bg-slate-50/30 text-xs text-slate-400 uppercase text-center"><tr><th class="py-3 px-6 border-b">เวลา</th><th class="py-3 px-6 border-b">ประเภท</th><th class="py-3 px-6 text-left border-b">รหัสสินค้า</th><th class="py-3 px-6 text-left border-b">ชื่อสินค้า</th><th class="py-3 px-6 border-b">จำนวน</th><th class="py-3 px-6 border-b">หน่วย</th><th class="py-3 px-6 border-b">โดย</th></tr></thead><tbody>
                        ${recentTrans.map(t => { const itemSplit = t.item.split(' - '), code = itemSplit[0] || '-', name = itemSplit[1] || '-', displayType = typeMap[t.type] || t.type;
                        return `<tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors text-center text-xs font-medium"><td class="px-6 py-4 text-slate-400 font-mono">${t.date.split(' ')[1]}</td><td class="px-6 py-4 text-center"><span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${t.type.includes('REC')?'bg-emerald-100 text-emerald-700':t.type.includes('ISS')?'bg-indigo-100 text-indigo-700':'bg-amber-100 text-amber-700'}">${displayType}</span></td><td class="px-6 py-4 font-mono font-bold text-indigo-600 text-left">${code}</td><td class="px-6 py-4 text-slate-700 text-left">${name}</td><td class="px-6 py-4 font-bold ${t.qty < 0 ? 'text-red-500' : 'text-emerald-500'}">${t.qty > 0 ? '+' : ''}${t.qty.toFixed(2)}</td><td class="px-6 py-4 text-slate-900 font-bold uppercase text-[10px]">${t.unit || '-'}</td><td class="px-6 py-4 text-slate-500 text-center">${t.actionBy}</td></tr>` }).join('')}
                        ${recentTrans.length === 0 ? '<tr><td colspan="7" class="px-6 py-10 text-center text-slate-400 italic font-medium">ยังไม่มีข้อมูลรายการเคลื่อนไหว</td></tr>' : ''}
                        </tbody></table></div>
                    </div>
                </div>`;
        }

        function card(t,v,i,tc,ic){return `<div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 dashboard-card flex flex-col items-center"><div><p class="text-slate-400 text-xs font-bold uppercase mb-2 text-center w-full">${t}</p><h3 class="text-3xl font-bold ${tc} text-center">${v.toLocaleString()}</h3></div><div class="mt-3 p-3 rounded-xl ${ic}"><i class="fas ${i} text-xl"></i></div></div>`;}

        function renderInventoryStatus() {
            const currentFilter = window.appState.inventoryFilter, isLowStockOnly = window.appState.inventoryLowStockOnly;
            let filteredItems = window.localData.items;
            if (currentFilter !== 'ALL') filteredItems = filteredItems.filter(i => i.type === currentFilter);
            const typeClasses = { 'RM': 'bg-emerald-100 text-emerald-600', 'FG': 'bg-indigo-100 text-indigo-600', 'PKG': 'bg-amber-100 text-amber-600' };
            
            const rows = filteredItems.map(i => {
                const s = window.localData.stock.filter(x=>String(x.itemId) === String(i.id)), 
                      tot=s.reduce((a,b)=>a+b.qty,0), 
                      av=s.filter(x=>x.status==='AVAILABLE').reduce((a,b)=>a+b.qty,0), 
                      qc=s.filter(x=>x.status==='WAIT_QC').reduce((a,b)=>a+b.qty,0);
                
                const isLow = tot <= (i.minStock || 0) && (i.minStock || 0) > 0;
                if (isLowStockOnly && !isLow) return null;

                const active = s.filter(x => x.qty > 0); 
                let ag = '<span class="text-slate-300">-</span>';
                if (active.length) {
                    ag = active.sort((a, b) => new Date(a.receivedDate) - new Date(b.receivedDate))
                        .map(lot => {
                            const d = Math.floor((new Date() - new Date(lot.receivedDate)) / 86400000);
                            return `<div class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[9px] border mb-1 mr-1 ${d <= 30 ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-red-50 text-red-700 border-red-100'}" title="Lot: ${lot.lotNo} | Qty: ${lot.qty}">
                                <span class="font-bold">${d}</span>
                                <span class="opacity-70 text-[8px]">ว.</span>
                            </div>`;
                        }).join('');
                }

                const canManage = window.checkPerm('manage_item');
                const cls = canManage ? 'text-slate-400 hover:text-primary' : 'text-slate-200 cursor-not-allowed';
                
                return `<tr class="hover:bg-slate-50 border-b border-slate-100 item-row" data-search="${i.code.toLowerCase()} ${i.name.toLowerCase()}">
                    <td class="py-3 px-6 text-left font-bold text-indigo-600 font-mono min-w-[180px] whitespace-nowrap">${i.code}</td>
                    <td class="py-3 px-6 text-left text-slate-700 font-medium">${i.name}</td>
                    <td class="py-3 px-6 text-center text-[10px]"><span class="${typeClasses[i.type] || 'bg-slate-100'} px-2 py-0.5 rounded font-bold">${i.type}</span></td>
                    <td class="py-3 px-6 text-center text-slate-400">${i.minStock||0}</td>
                    <td class="py-3 px-4 text-center min-w-[120px] max-w-[200px] whitespace-normal leading-tight">${ag}</td>
                    <td class="py-3 px-6 text-center font-bold ${isLow?'text-red-600':'text-slate-800'}">${tot.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                    <td class="py-3 px-6 text-center text-[10px] text-slate-900 font-bold uppercase text-center">${i.unit}</td>
                    <td class="py-3 px-6 text-center font-bold text-emerald-600 text-center">${av.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                    <td class="py-3 px-6 text-center font-bold text-amber-500 text-center">${qc>0?qc.toLocaleString():'-'}</td>
                    <td class="py-3 px-6 text-center"><button onclick="window.openMinStockModal('${i.id}')" class="${cls}" ${!canManage?'disabled':''}><i class="fas fa-cog"></i></button></td>
                </tr>`;
            }).filter(row => row !== null).join('');

            const getCount = (type) => window.localData.items.filter(i => type === 'ALL' || i.type === type).length;
            const lowStockCount = window.localData.items.filter(i => { const tot = window.localData.stock.filter(x=>String(x.itemId) === String(i.id)).reduce((a,b)=>a+b.qty,0); return tot <= (i.minStock || 0) && (i.minStock || 0) > 0; }).length;
            
            return `
                <div class="space-y-6 max-w-7xl mx-auto text-center">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border flex flex-col md:flex-row justify-between items-center gap-6">
                        <div><h3 class="font-bold text-xl text-slate-800 text-left"><i class="fas fa-boxes-stacked text-primary mr-2"></i> ยอดคงเหลือ</h3></div>
                        <div class="flex flex-wrap items-center gap-3">
                            <div class="segmented-control">
                                <div onclick="window.setInventoryFilter('ALL')" class="segmented-item ${currentFilter==='ALL'?'active':''}">
                                    <i class="fas fa-layer-group"></i> ทั้งหมด <span class="badge-count">${getCount('ALL')}</span>
                                </div>
                                <div onclick="window.setInventoryFilter('RM')" class="segmented-item ${currentFilter==='RM'?'active':''}">
                                    <i class="fas fa-leaf"></i> RM <span class="badge-count">${getCount('RM')}</span>
                                </div>
                                <div onclick="window.setInventoryFilter('PKG')" class="segmented-item ${currentFilter==='PKG'?'active':''}">
                                    <i class="fas fa-box-open"></i> PKG <span class="badge-count">${getCount('PKG')}</span>
                                </div>
                                <div onclick="window.setInventoryFilter('FG')" class="segmented-item ${currentFilter==='FG'?'active':''}">
                                    <i class="fas fa-check-double"></i> FG <span class="badge-count">${getCount('FG')}</span>
                                </div>
                            </div>
                            <button onclick="window.toggleLowStockFilter()" class="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-bold border transition-all ${isLowStockOnly?'bg-red-500 text-white border-red-500 shadow-lg shadow-red-200':'bg-white text-red-600 border-red-100 hover:border-red-200 hover:bg-red-50'}">
                                <i class="fas fa-triangle-exclamation"></i> สินค้าใกล้หมด <span class="${isLowStockOnly?'bg-white/20 text-white':'bg-red-100 text-red-600'} px-2 py-0.5 rounded-md text-[10px]">${lowStockCount}</span>
                            </button>
                            <div class="h-8 w-px bg-slate-200 mx-1"></div>
                            <button onclick="window.printStockCheckSheet()" class="flex items-center gap-2 bg-white hover:bg-red-50 text-red-600 border border-red-200 px-5 py-2.5 rounded-xl text-sm font-bold shadow-sm transition-all transform active:scale-95">
                                <i class="fas fa-file-pdf text-lg"></i> พิมพ์ใบตรวจนับ (PDF)
                            </button>
                        </div>
                    </div>
                    <div class="relative"><i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i><input id="inventory-search" onkeyup="window.filterInventoryTable()" class="w-full border-slate-200 border pl-11 pr-4 py-3.5 rounded-2xl bg-white shadow-sm focus:ring-2 focus:ring-primary outline-none transition-all text-left" placeholder="ค้นหาชื่อหรือรหัสสินค้าในคลัง..."></div>
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden h-[500px] flex flex-col">
                        <div class="flex-1 overflow-auto custom-scrollbar">
                            <table class="w-full text-sm text-left border-collapse" id="inventory-table">
                                <thead class="bg-slate-50/50 sticky top-0 shadow-sm z-10 text-center text-slate-500 font-bold uppercase text-[11px]"><tr><th class="py-4 px-6 text-left border-b min-w-[180px] whitespace-nowrap">รหัส</th><th class="py-4 px-6 text-left border-b">ชื่อสินค้า</th><th class="border-b">ประเภท</th><th class="border-b">Min</th><th class="border-b">Aging (ว.)</th><th class="border-b">คงเหลือ</th><th class="border-b">หน่วย</th><th class="border-b">พร้อมใช้</th><th class="border-b">รอ QC</th><th class="border-b">ตั้งค่า</th></tr></thead>
                                <tbody>${rows}</tbody>
                            </table>
                            ${rows === '' ? '<div class="p-20 text-center flex flex-col items-center gap-3"><i class="fas fa-magnifying-glass text-4xl text-slate-200"></i><p class="text-slate-400 italic">ไม่พบข้อมูลสินค้าที่คุณกำลังค้นหา</p></div>' : ''}
                        </div>
                    </div>
                </div>`;
        }

        function renderItemMaster() {
            const can = window.checkPerm('manage_item');
            const typeClasses = { 'RM': 'bg-emerald-100 text-emerald-600', 'FG': 'bg-indigo-100 text-indigo-600', 'PKG': 'bg-amber-100 text-amber-600' };
            const getCount = (type) => window.localData.items.filter(i => i.type === type).length;
            const form = can ? `
                <div class="space-y-6 text-left">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                        <h3 class="font-bold mb-4 text-slate-800 flex items-center"><i class="fas fa-plus-circle text-primary mr-2"></i> เพิ่มสินค้าใหม่</h3>
                        <form onsubmit="window.handleCreateItem(event)" class="space-y-4">
                            <div><label class="text-xs font-bold text-slate-500 uppercase block mb-1">รหัสสินค้า</label><input name="code" class="w-full border border-slate-200 p-2.5 rounded-xl focus:ring-2 focus:ring-primary outline-none" required></div>

            const l=window.appState.issueCart.map((c,i)=>`<tr class="border-b transition-colors hover:bg-slate-50/30 text-center text-sm font-medium"><td class="p-3 font-bold text-primary text-left font-mono">${c.item.code}</td><td class="p-3 text-left font-medium text-slate-700">${c.item.name}</td><td class="p-3 text-center"><div class="font-bold text-slate-700">${c.displayQty} ${c.displayUnit}</div><div class="text-[10px] text-slate-400 italic text-center">(= ${c.baseQty.toFixed(3)} ${c.unit})</div></td><td class="p-3 text-center"><button onclick="window.removeFromIssueCart(${i})" class="text-slate-300 hover:text-red-500 hover:bg-red-50 p-2 rounded-full transition-all"><i class="fas fa-trash-can"></i></button></td></tr>`).join(''); 
            return `<div class="max-w-4xl mx-auto space-y-6 text-center"><div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200"><div class="grid grid-cols-2 gap-6 text-left"><div><label class="text-xs font-bold text-slate-500 uppercase mb-2 block text-left">Ref Doc</label><input id="input-ref-doc" class="w-full border-slate-200 border p-3 rounded-xl font-bold placeholder-slate-300 focus:ring-2 focus:ring-primary outline-none transition-all" placeholder="เช่น JOB-2024-001" value="${window.appState.issueRefDoc}" onchange="window.appState.issueRefDoc=this.value"></div><div><label class="text-xs font-bold text-slate-500 uppercase mb-2 block text-left">วันที่เบิก</label><input type="datetime-local" id="input-issue-date" class="w-full border-slate-200 border p-3 rounded-xl bg-slate-50 text-slate-500 cursor-not-allowed" value="${window.appState.issueDate}" disabled></div></div></div><div class="bg-indigo-50/50 p-6 rounded-2xl border border-indigo-100 flex flex-col md:flex-row gap-4 items-end"><div class="flex-grow w-full text-left"><div><label class="text-xs font-bold text-indigo-400 uppercase mb-2 block text-left">ระบุสินค้าที่ต้องการเบิก</label>${window.renderSearchableItemInput('issue-item')}</div></div><div class="w-full md:w-32 text-left"><label class="text-xs font-bold text-indigo-400 uppercase mb-2 block text-center">จำนวน</label><input type="number" id="input-qty" class="w-full border-slate-200 border p-3 rounded-xl font-bold text-center focus:ring-2 focus:ring-primary outline-none" step="0.01"></div><div class="w-full md:w-32 text-left"><label class="text-xs font-bold text-indigo-400 uppercase mb-2 block text-center">หน่วยเบิก</label><select id="input-unit" class="w-full border-slate-200 border p-3 rounded-xl bg-white focus:ring-2 focus:ring-primary outline-none"><option value="kg">kg</option><option value="g">g</option><option value="pcs">pcs</option><option value="ml">ml</option></select></div><button onclick="window.handleAddIssueItem()" class="w-full md:w-auto bg-primary text-white px-8 py-3 rounded-xl font-bold shadow-indigo-200 shadow-lg hover:bg-indigo-700 transition-all transform active:scale-95">เพิ่ม</button></div><div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden"><table class="w-full text-sm text-left border-collapse"><thead class="bg-slate-50/50 border-b text-center text-slate-500 font-bold uppercase text-[11px]"><tr><th class="p-4 text-left border-b">รหัส</th><th class="text-left border-b">ชื่อสินค้า</th><th class="border-b">จำนวนที่เบิก</th><th class="border-b">Action</th></tr></thead><tbody>${l.length?l:'<tr><td colspan="4" class="p-16 text-center text-slate-400 italic font-medium">ยังไม่มีสินค้าในรายการเบิก</td></tr>'}</tbody></table><div class="p-6 border-t text-right bg-slate-50/30"><button onclick="window.processIssueBatch()" class="bg-slate-800 text-white px-10 py-3.5 rounded-xl font-bold shadow-lg hover:bg-dark transition-all transform active:scale-95 ${!l.length?'opacity-50 cursor-not-allowed':''}" ${!l.length?'disabled':''}>ยืนยันการเบิกจ่ายสินค้า</button></div></div></div>`; 
        }

        function renderUserList() { const list=window.localData.users.map(u=>`<tr class="border-b hover:bg-slate-50 transition-colors text-center text-sm font-medium"><td class="p-4 text-left font-mono text-slate-600">${u.username}</td><td class="p-4 text-left font-bold text-slate-700">${u.name}</td><td class="p-4 text-center"><span class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full text-[10px] font-bold border border-indigo-100">${u.role}</span></td><td class="p-4 text-center"><button onclick="window.deleteUser('${u.id}')" class="text-slate-300 hover:text-red-500 p-2 rounded-full transition-colors"><i class="fas fa-trash-can"></i></button></td></tr>`).join(''); return `<div class="max-w-4xl mx-auto text-center"><div class="flex justify-between items-center mb-6"><h3 class="text-xl font-bold text-slate-800"><i class="fas fa-users-gear text-primary mr-2"></i> จัดการผู้ใช้งาน</h3><button onclick="window.openUserManageModal()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition-all transform active:scale-95"><i class="fas fa-plus mr-2"></i> เพิ่มผู้ใช้ใหม่</button></div><div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden"><table class="w-full text-sm text-left border-collapse"><thead class="bg-slate-50/50 border-b text-center text-slate-500 font-bold uppercase text-[11px]"><tr><th class="p-4 text-left border-b">Username</th><th class="p-4 text-left border-b">ชื่อพนักงาน</th><th class="border-b">ตำแหน่ง (Role)</th><th class="border-b">Action</th></tr></thead><tbody>${list}</tbody></table></div></div>`; }
        
        function renderHistory() { 
            const isAdmin = window.appState.currentUser.role === 'ADMIN', typeMap = { 'RECEIVE': 'รับเข้า', 'ISSUE': 'เบิกจ่าย', 'QC_PASS': 'QC ผ่าน', 'QC_HOLD': 'กักกัน', 'QC_FAIL': 'QC ไม่ผ่าน' }; 
            return `<div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden text-center"><table class="w-full text-sm text-left border-collapse"><thead class="bg-slate-50 sticky top-0 shadow-sm z-10 text-center text-slate-500 font-bold uppercase text-[11px]"><tr><th class="py-4 px-4 border-b">เวลา</th><th class="border-b">ประเภท</th><th class="text-left border-b">สินค้า</th><th class="border-b">Lot</th><th class="border-b">จำนวน</th><th class="border-b">หน่วย</th><th class="border-b">โดย</th><th class="border-b">Note</th><th class="border-b">Action</th></tr></thead><tbody>${window.localData.transactions.map(t => {
                const isVoided = t.status === 'VOIDED';
                return `<tr class="border-b hover:bg-slate-50 transition-colors text-center text-xs font-medium ${isVoided ? 'voided-row bg-slate-50' : ''}">
                    <td class="p-3 text-[10px] text-slate-400 font-mono">${t.date}</td>
                    <td class="p-3 text-center">
                        <span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${isVoided ? 'bg-slate-200 text-slate-400' : (t.type.includes('REC')?'bg-emerald-100 text-emerald-700':t.type.includes('ISS')?'bg-indigo-100 text-indigo-700':'bg-amber-100 text-amber-700')}">
                            ${isVoided ? 'ยกเลิกแล้ว' : (typeMap[t.type]||t.type)}
                        </span>
                    </td>
                    <td class="p-3 text-left font-medium text-slate-700">${t.item || 'Unknown'}</td>
                    <td class="p-3 font-mono text-[10px] text-center"><span class="bg-slate-100 rounded px-2 py-0.5 border border-slate-200">${t.lot}</span></td>
                    <td class="p-3 text-center font-bold text-xs ${isVoided ? 'text-slate-300' : (t.qty<0?'text-red-500':'text-emerald-500')}">${t.qty > 0 ? '+' : ''}${t.qty.toFixed(2)}</td>
                    <td class="p-3 text-center text-slate-900 font-bold uppercase text-[10px]">${t.unit || '-'}</td>
                    <td class="p-3 text-[10px] text-slate-500 text-center">${t.actionBy}</td>
                    <td class="p-3 text-[10px] text-slate-400 text-center">${isVoided ? `โดย ${t.voidBy} (${t.voidAt})` : t.note}</td>
                    <td class="p-3 text-center">
                        <div class="flex justify-center gap-1">
                            ${!isVoided ? `<button onclick="window.voidTransaction('${t.id}')" class="text-orange-400 hover:text-orange-600 p-2 transition-colors" title="Void"><i class="fas fa-undo"></i></button>` : ''}
                            ${isAdmin ? `<button onclick="window.deleteTransaction('${t.id}')" class="text-slate-300 hover:text-red-500 transition-colors p-2" title="ลบถาวร"><i class="fas fa-trash-can"></i></button>` : ''}
                        </div>
                    </td>
                </tr>`}).join('')}</tbody></table></div>`; 
        }
    </script>
</body>
</html>
